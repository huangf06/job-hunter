# SVG Auto-Optimizer Configuration

# Vision API settings
vision:
  model: "claude-opus-4-6"
  max_tokens: 4096
  temperature: 0.3

# Optimization settings
optimization:
  max_iterations: 10
  plateau_threshold: 3  # Stop if score doesn't improve for N iterations

# Approval criteria
approval:
  min_quality_score: 8
  max_p0_issues: 0
  max_p1_issues: 1
  min_criteria_met: 3  # Out of 4 approval criteria

# SVG generation settings
svg:
  width: 800
  height: 1100
  font_family: "Arial, sans-serif"

  # Font sizes
  font_size:
    name: 24
    contact: 12
    section_header: 16
    company: 14
    role: 12
    bullet: 11

  # Spacing
  spacing:
    section_gap: 30
    company_gap: 10
    bullet_gap: 18
    line_height: 20

# Screenshot settings
screenshot:
  format: "png"
  full_page: true
  timeout_ms: 500

# PDF export settings
pdf:
  format: "A4"
  print_background: true
