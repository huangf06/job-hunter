# =============================================================================
# COVER LETTER KNOWLEDGE BASE — Human-originated fragments
# =============================================================================
#
# This file stores fragments extracted from handwritten and edited cover letters.
# The AI CL generator uses these as material when composing new letters.
#
# Fragment types:
#   company_observation  — Something noticed about a specific company (non-JD source)
#   company_connection   — Personal connection to the company/industry
#   personal_why         — Why you want this type of role / this specific opportunity
#   career_narrative     — How you tell the story of your career path
#   philosophical_insight — Deep reflections on work, technology, or craft
#   honest_limitation    — Admissions of what you don't know or haven't done
#   genuine_curiosity    — Real questions you have about a role or company
#   growth_motivation    — What you want to learn or develop
#   visa_context         — Netherlands visa/relocation context
#   education_narrative  — How you describe your educational background
#   production_wisdom    — Hard-won insights from building real systems
#
# Origin types:
#   handwritten     — Directly from a CL you wrote yourself (highest weight)
#   ai_edited       — AI-generated, then significantly edited by you
#   voice_example   — From voice example files (style reference)
#   ai_approved     — AI-generated, reviewed and approved without major edits
#
# role_types: which kinds of jobs this fragment is relevant for.
#   Use [all] if universally applicable.
# =============================================================================

fragments:

