projects:

  # ---------------------------------------------------------------------------
  # M.Sc. THESIS: Uncertainty Quantification in Deep RL
  # ---------------------------------------------------------------------------
  thesis_uq_rl:
    title: "Uncertainty Quantification Benchmark for Deep RL"
    institution: "VU Amsterdam"
    period: "Feb. 2025 - Aug. 2025"

    verified_bullets:

      - id: thesis_uq_framework
        status: active
        tags: [deep-rl, benchmarking, hpc, research]
        narrative_role: headline
        content: "Designed and implemented a standardized benchmarking framework for uncertainty quantification in Deep RL, orchestrating 150 independent training runs on SLURM-managed HPC under a full-factorial experimental protocol; unified CRPS, ACE, WIS, and coverage evaluation with statistical testing, establishing distributional learning as the strongest UQ approach across all four metrics."

      - id: thesis_noise_paradox
        status: active
        tags: [research, deep-rl, calibration]
        narrative_role: headline
        content: "Discovered a 'noise paradox' where moderate observation noise unexpectedly improves Bootstrapped DQN's uncertainty estimates by enhancing ensemble diversity; designed 6-stage reproducible evaluation pipeline with automated calibration benchmarking."

      - id: thesis_calibration
        status: deprecated
        tags: [bayesian, calibration, deep-rl]
        narrative_role: optional
        deprecation_reason: "Finding too nuanced for resume bullet ('calibration sometimes helps, sometimes hurts'); better as interview talking point. Two thesis bullets (uq_framework + noise_paradox) at 9/17 interviews already cover research narrative."
        content: "Proved that post-hoc calibration is not universally beneficial: standard calibration techniques improved Bootstrapped DQN (CRPS −11.2%) and MC Dropout (CRPS −12.9%) but degraded the already well-calibrated QR-DQN (CRPS +2.9%); established that calibration strategies must be method-specific rather than applied uniformly."

