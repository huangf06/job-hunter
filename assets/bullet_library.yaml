    - "extensive experience"
    - "proven track record"
    - "cutting-edge"
    - "world-class"
    - "industry-leading"
  extra_rules:
    - "Do NOT describe specific projects in the bio — the Projects section handles that. Bio should summarize overall profile (years, domain, core tech stack, certification)."
