name: Job Pipeline v4.0 - Single Runner
# =====================================
# 合并为单 job：减少 Turso sync 流量 ~85%
# 所有 step 共享同一 runner，embedded replica 只下载一次

on:
  schedule:
    # 每天3次：早中晚 (非整点，避开 GitHub Actions 高峰)
    # 荷兰时间: 08:23 / 12:23 / 16:23 (CET) 或 09:23 / 13:23 / 17:23 (CEST)
    - cron: '23 7,11,15 * * 1-5'
    # 周末每天跑一次，防止错过周五/周六发布的职位
    - cron: '23 8 * * 0,6'

  workflow_dispatch:
    inputs:
      profile:
        description: 'Search profile (ml_data / backend_data / quant / all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ml_data
          - backend_data
          - quant
      skip_scrape:
        description: 'Skip scraping (use existing data)'
        required: false
        default: false
        type: boolean
      force_refresh:
        description: 'Force refresh (ignore cache, re-scrape all)'
        required: false
        default: false
        type: boolean
      ai_limit:
        description: 'Max jobs for AI analysis (empty = auto)'
        required: false
        default: ''
        type: string

env:
  PYTHONUNBUFFERED: '1'
  TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
  TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Write LinkedIn cookies
        env:
          COOKIES_JSON: ${{ secrets.LINKEDIN_COOKIES }}
        run: |
          mkdir -p config
          printf '%s' "$COOKIES_JSON" > config/linkedin_cookies.json

      # ==========================================
      # Step 1: 爬取 (增量更新)
      # ==========================================
      - name: Scrape LinkedIn
        id: scrape
        if: ${{ github.event.inputs.skip_scrape != 'true' }}
        continue-on-error: true
        run: |
          PROFILE="${{ github.event.inputs.profile || 'all' }}"
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_refresh }}" == "true" ]; then
            FORCE_FLAG="--force-refresh"
            echo "🔄 Force refresh mode enabled"
          fi

          echo "=== Starting incremental scrape: $PROFILE ==="
          START_TIME=$(date +%s)

          if [ "$PROFILE" = "all" ]; then
            python scripts/linkedin_scraper_v6.py \
              --headless \
              --save-to-db \
              --no-json \
              $FORCE_FLAG
          else
            python scripts/linkedin_scraper_v6.py \
              --profile "$PROFILE" \
              --headless \
              --save-to-db \
              --no-json \
              $FORCE_FLAG
          fi

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          NEW_JOBS=$(python -c "import json; m=json.load(open('data/scrape_metrics.json')); print(m.get('new_jobs', 0))")
          echo "new_jobs_count=$NEW_JOBS" >> $GITHUB_OUTPUT
          echo "duration_seconds=$DURATION" >> $GITHUB_OUTPUT
          echo "✅ Scraped in ${DURATION}s, new jobs: $NEW_JOBS"

      - name: Upload scrape stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-stats-${{ github.run_id }}
          path: data/scrape_metrics.json
          retention-days: 7
          if-no-files-found: ignore

      # ==========================================
      # Step 2: 规则评分 (快速本地处理)
      # ==========================================
      - name: Rule-based scoring
        continue-on-error: true
        run: |
          echo "=== Running rule-based scoring ==="
          python scripts/job_pipeline.py --process

      # ==========================================
      # Step 3: AI 分析 (只处理高分新职位)
      # ==========================================
      - name: AI Analysis
        continue-on-error: true
        run: |
          LIMIT="${{ github.event.inputs.ai_limit }}"

          if [ -z "$LIMIT" ]; then
            NEW_JOBS="${{ steps.scrape.outputs.new_jobs_count }}"
            NEW_JOBS="${NEW_JOBS:-0}"
            LIMIT=$((NEW_JOBS + 20))
            echo "Auto-limit: $LIMIT (new: $NEW_JOBS + backlog: 20)"
          fi

          echo "=== Running AI analysis (limit: $LIMIT) ==="
          python scripts/job_pipeline.py --ai-analyze --limit "$LIMIT"

      # ==========================================
      # Step 4: 通知
      # ==========================================
      - name: Send Telegram notification
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify.py --status success

      # ==========================================
      # Step 5: 统计汇总
      # ==========================================
      - name: Pipeline stats
        if: always()
        run: |
          echo "=== Pipeline Stats ==="
          python scripts/job_pipeline.py --stats
