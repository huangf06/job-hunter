name: Job Pipeline
# =====================================
# 单 job 流水线：scrape → filter → C1 evaluate → C2 tailor → D render → notify
# 所有 step 共享同一 runner，embedded replica 只下载一次

on:
  schedule:
    # 工作日 2 次 (NL 时间 ~10:37 / ~16:37 CEST)
    - cron: '37 8,14 * * 1-5'
    # 周末中午 1 次
    - cron: '23 11 * * 0,6'

  workflow_dispatch:
    inputs:
      profile:
        description: 'Search profile (active profiles only, or all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - data_engineering
          - ml_engineering
          - backend_engineering
          - data_science
          - quant
          - ml_research
          - backend_ai_data
      skip_scrape:
        description: 'Skip scraping (use existing data)'
        required: false
        default: false
        type: boolean
      ai_limit:
        description: 'Max jobs for AI analysis (empty = 30)'
        required: false
        default: ''
        type: string

env:
  PYTHONUNBUFFERED: '1'
  TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
  TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
  CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write LinkedIn cookies
        env:
          COOKIES_JSON: ${{ secrets.LINKEDIN_COOKIES }}
        run: |
          mkdir -p config
          printf '%s' "$COOKIES_JSON" > config/linkedin_cookies.json

      # ==========================================
      # Step 1: Scrape (LinkedIn + Greenhouse)
      # ==========================================
      - name: Scrape jobs
        id: scrape
        if: ${{ github.event.inputs.skip_scrape != 'true' }}
        run: |
          PROFILE="${{ github.event.inputs.profile || 'all' }}"
          echo "=== Scraping ($PROFILE) ==="
          START_TIME=$(date +%s)

          if [ "$PROFILE" = "all" ]; then
            python scripts/scrape.py --all --save-to-db
          else
            python scripts/scrape.py --all --profile "$PROFILE" --save-to-db
          fi

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          NEW_JOBS=$(python -c "import json; m=json.load(open('data/scrape_metrics.json')); print(m.get('new_jobs', 0))")
          echo "new_jobs_count=$NEW_JOBS" >> $GITHUB_OUTPUT
          echo "duration_seconds=$DURATION" >> $GITHUB_OUTPUT
          echo "Scraped in ${DURATION}s, new jobs: $NEW_JOBS"

      - name: Upload scrape metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-stats-${{ github.run_id }}
          path: data/scrape_metrics.json
          retention-days: 7
          if-no-files-found: ignore

      # ==========================================
      # Step 2: Import + Hard Filter (Block B)
      # ==========================================
      - name: Import and hard filter
        id: filter
        run: |
          echo "=== Import + hard filter ==="
          python scripts/job_pipeline.py --process

      # ==========================================
      # Step 3: AI Evaluate (Block C1)
      # ==========================================
      - name: AI Evaluate (C1)
        id: ai_evaluate
        continue-on-error: true
        run: |
          echo "=== AI evaluation (C1) ==="
          AI_LIMIT="${{ github.event.inputs.ai_limit }}"
          python scripts/job_pipeline.py --ai-evaluate --limit ${AI_LIMIT:-30}

      # ==========================================
      # Step 4: AI Tailor (Block C2)
      # ==========================================
      - name: AI Tailor (C2)
        id: ai_tailor
        continue-on-error: true
        run: |
          echo "=== AI resume tailoring (C2) ==="
          AI_LIMIT="${{ github.event.inputs.ai_limit }}"
          python scripts/job_pipeline.py --ai-tailor --limit ${AI_LIMIT:-30}

      # ==========================================
      # Step 5: Generate Resumes (Block D)
      # ==========================================
      - name: Generate resumes
        id: generate
        continue-on-error: true
        run: |
          echo "=== Rendering resumes ==="
          AI_LIMIT="${{ github.event.inputs.ai_limit }}"
          python scripts/job_pipeline.py --generate --limit ${AI_LIMIT:-30}

      # ==========================================
      # Step 6: Notify
      # ==========================================
      - name: Send Telegram notification
        if: always()
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FAILED_STEPS=""
          [ "${{ steps.scrape.outcome }}" == "failure" ] && FAILED_STEPS="scrape"
          [ "${{ steps.filter.outcome }}" == "failure" ] && FAILED_STEPS="${FAILED_STEPS:+$FAILED_STEPS, }filter"
          [ "${{ steps.ai_evaluate.outcome }}" == "failure" ] && FAILED_STEPS="${FAILED_STEPS:+$FAILED_STEPS, }ai-evaluate"
          [ "${{ steps.ai_tailor.outcome }}" == "failure" ] && FAILED_STEPS="${FAILED_STEPS:+$FAILED_STEPS, }ai-tailor"
          [ "${{ steps.generate.outcome }}" == "failure" ] && FAILED_STEPS="${FAILED_STEPS:+$FAILED_STEPS, }generate"
          if [ -n "$FAILED_STEPS" ]; then
            python scripts/notify.py --status failure --failed-step "$FAILED_STEPS"
          else
            python scripts/notify.py --status success
          fi

      # ==========================================
      # Step 7: Stats
      # ==========================================
      - name: Pipeline stats
        if: always()
        run: |
          echo "=== Pipeline Stats ==="
          python scripts/job_pipeline.py --stats
