       class="place"
       dx="4"
       id="tspan50">-</tspan><tspan
       class="role"
       dx="4"
       id="tspan51">Business Analyst</tspan></text>
  <text
     class="date"
     x="42"
     y="674.5"
     id="text52">JULY 2010 - AUGUST 2013</text>
  <text
     class="body"
     x="42"
     y="687.5"
     id="text53">Created a pipeline to ingest, validate, and consolidate</text>
  <text
     class="body"
     x="42"
     y="700.5"
     id="text54">non-standard Excel reports from 70+ business units,</text>
  <text
     class="body"
     x="42"
     y="713.5"
     id="text55">reducing monthly processing time from <tspan
   style="font-weight:bold"
   id="tspan55a">2 days to 2 hours</tspan>.</text>
