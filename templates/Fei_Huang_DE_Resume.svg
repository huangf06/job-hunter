  <!-- Bio -->
  <text
     class="section"
     x="42"
     y="84.5"
     id="text7">BIO</text>
  <text
     class="bio"
     x="42"
     y="99.5"
     id="text8"><tspan
   style="font-weight:bold"
   id="tspan1">Data Engineer</tspan> with 6+ years of experience building data platforms across e-commerce, market data, and credit risk.</text>
  <text
     class="bio"
     x="42"
     y="111.5"
     id="text9">Built end-to-end ingestion, warehousing, data quality, and decisioning systems from the ground up. </text>
  <text
     class="bio"
     x="42"
     y="123.5"
     id="text10"><tspan
   style="font-weight:bold"
   id="tspan10a">M.Sc. in Artificial Intelligence</tspan>. Certified Data Engineer with hands-on experience in Spark and Delta Lake.</text>
  <!-- Left column: Experience -->
  <text
     class="section"
     x="42"
     y="144.5"
     id="text11">EXPERIENCE</text>
  <text
     x="42"
     y="159.5"
     id="text13"><tspan
       class="org"
       id="tspan11">GLP Technology (Fintech)</tspan><tspan
       class="place"
       dx="4"
       id="tspan12">-</tspan><tspan
       class="role"
       dx="4"
       id="tspan13">Lead Data Engineer</tspan></text>
  <text
     class="date"
     x="42"
     y="170.5"
     id="text14">JULY 2017 - AUGUST 2019</text>
  <text
     class="body"
     x="42"
     y="183.5"
     id="text15">Built the credit risk data platform from scratch as the</text>
  <text
     class="body"
     x="42"
     y="196.5"
     id="text16"><tspan
   style="font-weight:bold"
   id="tspan16a">founding data engineer</tspan>, enabling production lending</text>
  <text
     class="body"
     x="42"
     y="209.5"
     id="text17">workflows across ingestion, Redshift warehousing,</text>
  <text
     class="body"
     x="42"
     y="222.5"
     id="text18">automated decisioning, and post-loan monitoring.</text>
  <text
     class="body"
     x="42"
     y="238.5"
     id="text19">Developed the core data layer, ingesting 30+ production</text>
  <text
     class="body"
     x="42"
     y="251.5"
     id="text20">tables into Redshift and transforming nested credit</text>
  <text
     class="body"
     x="42"
     y="264.5"
     id="text21">bureau JSON into 5 normalized analytical tables for</text>
  <text
     class="body"
     x="42"
     y="277.5"
     id="text22">downstream risk analysis and decision support.</text>
  <text
     class="body"
     x="42"
     y="293.5"
     id="text23">Implemented an automated risk decision engine with</text>
  <text
     class="body"
     x="42"
     y="306.5"
     id="text24">29 rejection rules, 36 borrower segments, and</text>
  <text
     class="body"
     x="42"
     y="319.5"
     id="text25">a 19-feature scorecard for production credit decisions</text>
  <text
     class="body"
     x="42"
     y="332.5"
     id="text26">and first-payment-default assessment.</text>
  <text
     class="body"
     x="42"
     y="348.5"
     id="text27"><tspan
   class="body-bold"
   id="tspan26">Skills:</tspan> Python, SQL, AWS, Redshift, Airflow, Docker</text>
  <text
     x="42"
     y="372.5"
     id="text29"><tspan
       class="org"
       id="tspan27">BQ Investment (Hedge Fund)</tspan><tspan
       class="place"
       dx="4"
       id="tspan28">-</tspan><tspan
       class="role"
       dx="4"
       id="tspan29">Quant Developer</tspan></text>
  <text
     class="date"
     x="42"
     y="383.5"
     id="text30">JULY 2015 - JUNE 2017</text>
  <text
     class="body"
     x="42"
     y="396.5"
     id="text31">Engineered market data pipelines and infrastructure</text>
  <text
     class="body"
     x="42"
     y="409.5"
     id="text32">for trading and research workflows, covering 3,000+</text>
  <text
     class="body"
     x="42"
     y="422.5"
     id="text33">securities across 5+ years of tick-level futures data</text>
  <text
     class="body"
     x="42"
     y="435.5"
     id="text33a">from multiple vendor feeds.</text>
  <text
     class="body"
     x="42"
     y="451.5"
     id="text34">Implemented data quality controls for deduplication,</text>
  <text
     class="body"
     x="42"
     y="464.5"
     id="text35">completeness, and cross-source validation, improving</text>
  <text
     class="body"
     x="42"
     y="477.5"
     id="text36">data reliability for downstream analytics and live trading.</text>
  <text
     class="body"
     x="42"
     y="493.5"
     id="text39"><tspan
   class="body-bold"
   id="tspan37">Skills:</tspan> Python, SQL, MATLAB, Data Quality</text>
  <text
     x="42"
     y="517.5"
     id="text40"><tspan
       class="org"
       id="tspan38">Ele.me (Alibaba Group)</tspan><tspan
       class="place"
       dx="4"
       id="tspan39">-</tspan><tspan
       class="role"
       dx="4"
       id="tspan40">Data Analyst</tspan></text>
  <text
     class="date"
     x="42"
     y="528.5"
     id="text41">SEPTEMBER 2013 - JULY 2015</text>
  <text
     class="body"
     x="42"
     y="541.5"
     id="text42">Built anti-fraud detection system identifying <tspan
   style="font-weight:bold"
   id="tspan42a">51,000+</tspan></text>
  <text
     class="body"
     x="42"
     y="554.5"
     id="text43">suspicious order clusters across <tspan
   style="font-weight:bold"
   id="tspan43a">2.2M+ users</tspan> using</text>
  <text
     class="body"
     x="42"
     y="567.5"
     id="text44">3 pattern-matching algorithms: same-phone,</text>
  <text
     class="body"
     x="42"
     y="580.5"
     id="text45">high-frequency, and repeat-order detection.</text>
  <text
     class="body"
     x="42"
     y="596.5"
     id="text46">Optimized 90+ Hadoop/Hive queries through partition</text>
  <text
     class="body"
     x="42"
     y="609.5"
     id="text47">pruning and subquery pushdown, reducing scanned data</text>
  <text
     class="body"
     x="42"
     y="622.5"
     id="text48">by <tspan
   style="font-weight:bold"
   id="tspan48a">80%</tspan> (500GB to 100GB) across 30+ warehouse tables.</text>
  <text
     class="body"
     x="42"
     y="639.5"
     id="text50"><tspan
   class="body-bold"
