  <!-- BIO -->
  <text class="section" x="42" y="84.5" id="text7">BIO</text>
  <text class="bio" x="42" y="99.5" id="text8"><tspan style="font-weight:bold" id="tspan1">ML Engineer</tspan> with production credit decisioning experience and quantitative evaluation rigor.</text>
  <text class="bio" x="42" y="111.5" id="text9">Built decision systems processing hundreds of daily applications in fintech, developed live trading</text>
  <text class="bio" x="42" y="123.5" id="text10">strategies achieving <tspan style="font-weight:bold">14.6% annualized return</tspan> with rigorous backtesting, and delivered ML projects</text>
  <text class="bio" x="42" y="135.5" id="text10a">from feature engineering through deployment. Combines hands-on modeling, systematic evaluation,</text>
  <text class="bio" x="42" y="147.5" id="text10b">and production deployment experience. M.Sc. in AI from VU Amsterdam.</text>

  <!-- EXPERIENCE -->
  <text class="section" x="42" y="168.5" id="text11">EXPERIENCE</text>

  <!-- GLP -->
  <text x="42" y="183.5" id="text13"><tspan class="org" id="tspan11">GLP Technology (Fintech)</tspan><tspan class="place" dx="4" id="tspan12">-</tspan><tspan class="role" dx="4" id="tspan13">Data Scientist &amp; Team Lead</tspan></text>
  <text class="date" x="42" y="194.5" id="text14">JULY 2017 - AUGUST 2019</text>

  <text class="body" x="42" y="207.5" id="text15">First technical hire at a consumer lending fintech; built</text>
  <text class="body" x="42" y="220.5" id="text16">the credit decisioning system from data pipeline through</text>
  <text class="body" x="42" y="233.5" id="text17">automated approval and post-loan monitoring, processing</text>
  <text class="body" x="42" y="246.5" id="text18">hundreds of daily applications.</text>

  <text class="body" x="42" y="262.5" id="text19">Designed the core decision engine: <tspan style="font-weight:bold">29 rejection rules</tspan></text>
  <text class="body" x="42" y="275.5" id="text20">across overdue, debt, inquiry, and customer segment</text>
  <text class="body" x="42" y="288.5" id="text21">dimensions; <tspan style="font-weight:bold">36-segment borrower classification</tspan>; and a</text>
  <text class="body" x="42" y="301.5" id="text22"><tspan style="font-weight:bold">19-feature scorecard model</tspan> predicting first-payment</text>
  <text class="body" x="42" y="314.5" id="text23">default risk.</text>

  <text class="body" x="42" y="330.5" id="text24">Developed post-loan monitoring systems including</text>
  <text class="body" x="42" y="343.5" id="text25">delinquency tracking, repayment trend analysis, and</text>
  <text class="body" x="42" y="356.5" id="text26">first-repayment early warning with third-party fraud</text>
  <text class="body" x="42" y="369.5" id="text27">API integration.</text>

  <text class="body" x="42" y="385.5" id="text28"><tspan class="body-bold" id="tspan28">Skills:</tspan> Python, SQL, AWS (Redshift, S3, EC2), Airflow, pandas, NumPy</text>

  <!-- BQ -->
  <text x="42" y="409.5" id="text29"><tspan class="org" id="tspan29">BQ Investment (Hedge Fund)</tspan><tspan class="place" dx="4" id="tspan30">-</tspan><tspan class="role" dx="4" id="tspan31">Quantitative Researcher</tspan></text>
  <text class="date" x="42" y="420.5" id="text30">JULY 2015 - JUNE 2017</text>

  <text class="body" x="42" y="433.5" id="text31">Developed and deployed an R-Breaker intraday trading</text>
  <text class="body" x="42" y="446.5" id="text32">strategy for CSI index futures from research through live</text>
  <text class="body" x="42" y="459.5" id="text33">production, achieving <tspan style="font-weight:bold">14.6% annualized return</tspan> with</text>
  <text class="body" x="42" y="472.5" id="text34">real capital and rigorous backtesting validation.</text>

  <text class="body" x="42" y="488.5" id="text35">Built a factor research pipeline applying Fama-MacBeth</text>
  <text class="body" x="42" y="501.5" id="text36">regression across <tspan style="font-weight:bold">3,000+ securities</tspan>; validated factors</text>
  <text class="body" x="42" y="514.5" id="text37">were integrated into the fund's live portfolio construction.</text>

  <text class="body" x="42" y="530.5" id="text40"><tspan class="body-bold" id="tspan44">Skills:</tspan> Python, MATLAB, SQL, NumPy, pandas, scipy</text>

  <!-- Ele.me -->
  <text x="42" y="554.5" id="text45"><tspan class="org" id="tspan45">Ele.me (Alibaba Group)</tspan><tspan class="place" dx="4" id="tspan46">-</tspan><tspan class="role" dx="4" id="tspan47">Data Analyst</tspan></text>
  <text class="date" x="42" y="565.5" id="text46">SEPTEMBER 2013 - JULY 2015</text>

  <text class="body" x="42" y="578.5" id="text47">Built an anti-fraud detection system identifying <tspan style="font-weight:bold">51,000+</tspan></text>
  <text class="body" x="42" y="591.5" id="text48">suspicious order clusters across <tspan style="font-weight:bold">2.2M+ users</tspan> using 3</text>
  <text class="body" x="42" y="604.5" id="text49">pattern algorithms during hyper-growth at Ele.me.</text>

  <text class="body" x="42" y="620.5" id="text52"><tspan class="body-bold" id="tspan57">Skills:</tspan> SQL, Hadoop, Hive, Python, pandas, A/B Testing</text>

  <!-- Independent Researcher -->
  <text x="42" y="644.5" id="text52a"><tspan class="org" id="tspan52a">Independent Quantitative Researcher</tspan><tspan class="place" dx="4" id="tspan52b">-</tspan><tspan class="role" dx="4" id="tspan52c">Remote</tspan></text>
  <text class="date" x="42" y="655.5" id="text52d">SEPTEMBER 2019 - AUGUST 2023</text>

  <!-- EDUCATION -->
  <text class="section" x="326" y="170.5" id="text58">EDUCATION</text>

  <!-- VU Amsterdam -->
  <text x="326" y="185.5" id="text59"><tspan class="org" id="tspan59">Vrije Universiteit Amsterdam</tspan></text>
  <text x="326" y="199" id="text60"><tspan class="role" id="tspan60">M.Sc. in Artificial Intelligence (GPA: 8.2/10)</tspan></text>
  <text class="date" x="326" y="212.5" id="text61">SEPTEMBER 2023 - AUGUST 2025</text>

  <text class="body" x="326" y="228" id="text62">Thesis: Uncertainty Quantification in Deep RL</text>

  <text class="body" x="326" y="241" id="text63">Built an evaluation framework across 3 methods, 5</text>
  <text class="body" x="326" y="254" id="text64">environments, and <tspan style="font-weight:bold">150 training runs</tspan> to systematically</text>
  <text class="body" x="326" y="267" id="text64a">benchmark ensemble-based approaches.</text>

  <text class="body" x="326" y="280" id="text64b">Discovered a <tspan style="font-weight:bold">noise paradox</tspan>: moderate observation</text>
  <text class="body" x="326" y="293" id="text64c">noise unexpectedly improved ensemble uncertainty</text>
  <text class="body" x="326" y="306" id="text64d">estimates, revealing that data quality and estimate</text>
  <text class="body" x="326" y="319" id="text64e">quality don't always align.</text>

  <!-- Tsinghua -->
  <text x="326" y="340" id="text65"><tspan class="org" id="tspan65">Tsinghua University</tspan></text>
  <text x="326" y="355" id="text66"><tspan class="role" id="tspan66">B.Eng. in Industrial Engineering</tspan></text>
  <text class="date" x="326" y="368.5" id="text67">SEPTEMBER 2006 - JULY 2010</text>

  <!-- PROJECTS -->
  <text class="section" x="326" y="393" id="text68">PROJECTS</text>

  <!-- Expedia -->
  <text x="326" y="408" id="text69"><tspan class="org" id="tspan69">Expedia Hotel Recommendation</tspan></text>
  <text class="date" x="326" y="420.5" id="text70">APRIL 2024 - MAY 2024</text>

  <text class="body" x="326" y="435" id="text71">Built a hotel recommendation system using LightGBM</text>
  <text class="body" x="326" y="448" id="text72">LambdaRank on 4.96M Expedia search records;</text>
  <text class="body" x="326" y="461" id="text73">engineered temporal, behavioral, and aggregation</text>
  <text class="body" x="326" y="474" id="text74">features and achieved <tspan style="font-weight:bold">NDCG@5 = 0.392</tspan> in a</text>
  <text class="body" x="326" y="487" id="text75">200-person ranking competition.</text>

  <text class="body" x="326" y="500" id="text76"><tspan class="body-bold" id="tspan77">Skills:</tspan> LightGBM, Learning-to-Rank, Feature Engineering</text>

  <!-- ML4QS -->
  <text x="326" y="524" id="text78"><tspan class="org" id="tspan78">ML for Quantified Self: IMU Sensor</tspan></text>
  <text class="date" x="326" y="536.5" id="text79">SEPTEMBER 2024 - DECEMBER 2024</text>

  <text class="body" x="326" y="551" id="text80">Built an end-to-end ML pipeline for multi-sensor IMU</text>
  <text class="body" x="326" y="564" id="text81">data using Kalman filtering, FFT-based feature</text>
  <text class="body" x="326" y="577" id="text82">engineering, LightGBM, and Bidirectional LSTM.</text>

  <text class="body" x="326" y="590" id="text83">Engineered <tspan style="font-weight:bold">576+ features</tspan> across time and frequency</text>
  <text class="body" x="326" y="603" id="text84">domains and achieved <tspan style="font-weight:bold">65%</tspan> person identification</text>
  <text class="body" x="326" y="616" id="text85">(4-class) and <tspan style="font-weight:bold">94-99%</tspan> sex classification accuracy.</text>

  <text class="body" x="326" y="629" id="text86"><tspan class="body-bold" id="tspan86">Skills:</tspan> Python, LightGBM, PyTorch, Optuna, Kalman Filter, Signal Processing</text>

  <!-- Poem Generator -->
  <text x="326" y="653" id="text84a"><tspan class="org" id="tspan84a">Poem Generator</tspan></text>
  <text class="date" x="326" y="665.5" id="text84b">2024</text>

  <text class="body" x="326" y="680" id="text84c">Built a text generation application using GPT-2 and</text>
  <text class="body" x="326" y="693" id="text84d">Hugging Face Transformers with prompt controls for</text>
  <text class="body" x="326" y="706" id="text84e">style variation; deployed as an interactive web interface</text>
  <text class="body" x="326" y="719" id="text84f">via Flask.</text>

  <text class="body" x="326" y="732" id="text84g"><tspan class="body-bold" id="tspan84h">Skills:</tspan> Python, GPT-2, Hugging Face Transformers, Flask</text>

  <!-- TECHNICAL SKILLS -->
  <text class="section" x="326" y="757.5" id="text87">TECHNICAL SKILLS</text>

  <text class="body" x="326" y="772.5" id="text88"><tspan class="body-bold" id="tspan88">ML &amp; Deep Learning:</tspan> PyTorch, scikit-learn, LightGBM,</text>
  <text class="body" x="326" y="785.5" id="text89">XGBoost, Hugging Face Transformers, Feature Engineering</text>

  <text class="body" x="326" y="801.5" id="text90"><tspan class="body-bold" id="tspan89">Programming:</tspan> Python, SQL, MATLAB, Bash</text>

  <text class="body" x="326" y="817.5" id="text91"><tspan class="body-bold" id="tspan91">Data &amp; Infrastructure:</tspan> AWS (Redshift, S3, EC2), Airflow, Hadoop, Hive, Docker, Git</text>

  <!-- LANGUAGES -->
  <text class="section" x="42" y="685" id="text94">LANGUAGES</text>
  <text class="body" x="42" y="700" id="text95"><tspan x="42" id="tspan95a">English - Fluent</tspan><tspan x="120" id="tspan95b">|</tspan><tspan x="136" id="tspan95c">Mandarin - Native</tspan></text>
