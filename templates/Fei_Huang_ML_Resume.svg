  <!-- ==================== BIO ==================== -->
  <text class="section" x="42" y="84.5" id="s1">BIO</text>
  <text class="bio" x="42" y="99.5" id="b1"><tspan style="font-weight:bold">Machine Learning Engineer</tspan> with an M.Sc. in AI (GPA 8.2) and 6 years building prediction and scoring</text>
  <text class="bio" x="42" y="111.5" id="b2">systems in fintech, trading, and e-commerce. Strengths in feature engineering, model evaluation, and</text>
  <text class="bio" x="42" y="123.5" id="b3">end-to-end ML pipelines, from raw data through production deployment.</text>

  <!-- ==================== LEFT: EXPERIENCE ==================== -->
  <text class="section" x="42" y="156.5" id="s2">EXPERIENCE</text>

  <!-- GLP Technology -->
  <text x="42" y="171.5" id="e1"><tspan class="org">GLP Technology (Fintech)</tspan><tspan class="place" dx="4">-</tspan><tspan class="role" dx="4">Senior Data Scientist</tspan></text>
  <text class="date" x="42" y="182.5" id="e2">JULY 2017 - AUGUST 2019</text>
  <text class="body" x="42" y="195.5" id="e3">Joined as <tspan style="font-weight:bold">first data hire</tspan> and built the end-to-end</text>
  <text class="body" x="42" y="208.5" id="e4">credit risk prediction system: engineered 19 features</text>
  <text class="body" x="42" y="221.5" id="e5">from raw bureau and transactional data, developed a</text>
  <text class="body" x="42" y="234.5" id="e6">first-payment default scorecard with 36-segment</text>
  <text class="body" x="42" y="247.5" id="e7">borrower classification, and deployed the model into</text>
  <text class="body" x="42" y="260.5" id="e8">production underwriting serving real lending decisions.</text>
  <text class="body" x="42" y="276.5" id="e9">Built the feature pipeline powering all risk models:</text>
  <text class="body" x="42" y="289.5" id="e10">automated ingestion of 30+ production tables and</text>
  <text class="body" x="42" y="302.5" id="e11">credit bureau data, transforming raw nested JSON into</text>
  <text class="body" x="42" y="315.5" id="e12">structured analytical features for model training,</text>
  <text class="body" x="42" y="328.5" id="e13">scoring, and post-loan monitoring.</text>
  <text class="body" x="42" y="344.5" id="e14"><tspan class="body-bold">Skills:</tspan> Python, SQL, PySpark, Feature Engineering,</text>
  <text class="body" x="42" y="357.5" id="e15">AWS (Redshift, S3), Airflow</text>

  <!-- BQ Investment -->
  <text x="42" y="381.5" id="e16"><tspan class="org">BQ Investment (Hedge Fund)</tspan><tspan class="place" dx="4">-</tspan><tspan class="role" dx="4">Quant Researcher</tspan></text>
  <text class="date" x="42" y="392.5" id="e17">JULY 2015 - JUNE 2017</text>
  <text class="body" x="42" y="405.5" id="e18">Developed and deployed a signal-driven intraday</text>
  <text class="body" x="42" y="418.5" id="e19">predictive model from research through live production</text>
  <text class="body" x="42" y="431.5" id="e20">on CSI index futures, delivering <tspan style="font-weight:bold">14.6% annualized</tspan></text>
  <text class="body" x="42" y="444.5" id="e21"><tspan style="font-weight:bold">return</tspan> with real capital.</text>
  <text class="body" x="42" y="460.5" id="e22">Built systematic feature validation pipeline evaluating</text>
  <text class="body" x="42" y="473.5" id="e23">4 factor families across <tspan style="font-weight:bold">3,000+ securities</tspan> using</text>
  <text class="body" x="42" y="486.5" id="e24">cross-sectional regression; validated features</text>
  <text class="body" x="42" y="499.5" id="e25">integrated into the fund's live portfolio construction.</text>
  <text class="body" x="42" y="515.5" id="e26"><tspan class="body-bold">Skills:</tspan> Python, SQL, NumPy, pandas, Statistical Modeling</text>

  <!-- Ele.me -->
  <text x="42" y="539.5" id="e27"><tspan class="org">Ele.me (Alibaba Group)</tspan><tspan class="place" dx="4">-</tspan><tspan class="role" dx="4">Data Analyst</tspan></text>
  <text class="date" x="42" y="550.5" id="e28">SEPTEMBER 2013 - JULY 2015</text>
  <text class="body" x="42" y="563.5" id="e29">Built anomaly detection system identifying <tspan style="font-weight:bold">51,000+</tspan></text>
  <text class="body" x="42" y="576.5" id="e30">suspicious order clusters across <tspan style="font-weight:bold">2.2M+ users</tspan> using</text>
  <text class="body" x="42" y="589.5" id="e31">pattern-matching algorithms (same-phone, high-</text>
  <text class="body" x="42" y="602.5" id="e32">frequency, repeat-order); deployed during Ele.me's</text>
  <text class="body" x="42" y="615.5" id="e33">hyper-growth phase pre-Alibaba acquisition.</text>
  <text class="body" x="42" y="631.5" id="e34"><tspan class="body-bold">Skills:</tspan> Python, SQL, Clustering, Anomaly Detection</text>

  <!-- ==================== LEFT: TECHNICAL SKILLS ==================== -->
  <text class="section" x="42" y="660" id="s3">TECHNICAL SKILLS</text>
  <text class="body" x="42" y="675" id="sk1"><tspan class="body-bold">ML &amp; Modeling:</tspan> PyTorch, Hugging Face Transformers,</text>
  <text class="body" x="42" y="688" id="sk2">scikit-learn, LightGBM, XGBoost, Learning-to-Rank,</text>
  <text class="body" x="42" y="701" id="sk3">Deep RL, Statistical Testing</text>
  <text class="body" x="42" y="717" id="sk4"><tspan class="body-bold">Programming:</tspan> Python, SQL, NumPy, pandas, Bash</text>
  <text class="body" x="42" y="733" id="sk6"><tspan class="body-bold">Data &amp; Infrastructure:</tspan> PySpark, Airflow, FastAPI,</text>
  <text class="body" x="42" y="746" id="sk7">AWS (Redshift, S3, EC2), Delta Lake, Docker, Git</text>
  <text class="body" x="42" y="762" id="sk8"><tspan class="body-bold">Domains:</tspan> Feature Engineering, NLP, Time-Series,</text>
  <text class="body" x="42" y="775" id="sk9">Anomaly Detection, Uncertainty Quantification</text>

  <!-- ==================== RIGHT: EDUCATION ==================== -->
  <text class="section" x="326" y="156.5" id="s5">EDUCATION</text>
  <text x="326" y="171.5" id="ed1"><tspan class="org">Vrije Universiteit Amsterdam</tspan></text>
