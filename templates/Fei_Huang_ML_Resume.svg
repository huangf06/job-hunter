  <!-- ==================== RIGHT: PROJECTS ==================== -->
  <text class="section" x="326" y="350" id="s7">PROJECTS</text>

  <!-- Thesis UQ Benchmark -->
  <text x="326" y="365" id="p1"><tspan class="org">Uncertainty Quantification Benchmark</tspan></text>
  <text class="date" x="326" y="377.5" id="p2">FEBRUARY 2025 - AUGUST 2025</text>
  <text class="body" x="326" y="392" id="p3">Built reproducible benchmark evaluating 5</text>
  <text class="body" x="326" y="405" id="p4">uncertainty quantification methods for Deep RL</text>
  <text class="body" x="326" y="418" id="p5">across <tspan style="font-weight:bold">150+ training runs</tspan> on HPC (SLURM)</text>
  <text class="body" x="326" y="431" id="p6">with automated 6-stage calibration pipeline.</text>
  <text class="body" x="326" y="447" id="p7">Discovered a <tspan style="font-weight:bold">noise paradox</tspan>: moderate</text>
  <text class="body" x="326" y="460" id="p8">observation noise unexpectedly improved</text>
  <text class="body" x="326" y="473" id="p9">ensemble uncertainty estimates, challenging</text>
  <text class="body" x="326" y="486" id="p10">standard assumptions in UQ method evaluation.</text>
  <text class="body" x="326" y="499" id="p10b"><tspan class="body-bold">Skills:</tspan> PyTorch, Deep RL, HPC, Statistical Testing</text>

  <!-- Expedia Hotel Recommendation -->
  <text x="326" y="523" id="p11"><tspan class="org">Expedia Hotel Recommendation</tspan></text>
  <text class="date" x="326" y="535.5" id="p12">APRIL 2024 - MAY 2024</text>
  <text class="body" x="326" y="550" id="p13">Built hotel recommendation system using</text>
  <text class="body" x="326" y="563" id="p14"><tspan style="font-weight:bold">LightGBM LambdaRank</tspan> on 4.96M Expedia search</text>
  <text class="body" x="326" y="576" id="p15">records; engineered 50+ temporal, behavioral, and</text>
  <text class="body" x="326" y="589" id="p16">price-normalization features; achieved</text>
  <text class="body" x="326" y="602" id="p17"><tspan style="font-weight:bold">NDCG@5 = 0.392</tspan> on held-out Kaggle evaluation.</text>
  <text class="body" x="326" y="615" id="p18"><tspan class="body-bold">Skills:</tspan> LightGBM, Learning-to-Rank, Feature Eng.</text>

  <!-- ML4QS Sensor Classification -->
  <text x="326" y="639" id="p19"><tspan class="org">IMU Sensor Classification (ML4QS)</tspan></text>
  <text class="date" x="326" y="651.5" id="p20">JUNE 2024</text>
  <text class="body" x="326" y="666" id="p21">Built end-to-end ML pipeline for IMU sensor</text>
  <text class="body" x="326" y="679" id="p22">classification (4 subjects, 6 activities): Kalman</text>
  <text class="body" x="326" y="692" id="p23">Filter for noise reduction on 12 sensor channels,</text>
  <text class="body" x="326" y="705" id="p24"><tspan style="font-weight:bold">576 FFT-based features</tspan> (time + frequency domain),</text>
  <text class="body" x="326" y="718" id="p25">and LightGBM + bidirectional LSTM achieving</text>
  <text class="body" x="326" y="731" id="p26"><tspan style="font-weight:bold">94-99% gender classification</tspan> accuracy.</text>
  <text class="body" x="326" y="744" id="p27"><tspan class="body-bold">Skills:</tspan> LightGBM, LSTM, Feature Eng., Time-Series</text>

