      y="454.31268"
     id="text55">SEPTEMBER 2013 - JULY 2015</text>
  <text
     class="body"
     x="45.474354"
      y="467.11267"
     id="text56">Optimized 90+ Hadoop/Hive queries, reducing scan</text>
  <text
     class="body"
     x="45.474354"
      y="480.21265"
     id="text57">volume 5x (500GB to 100GB) and significantly improving</text>
  <text
     class="body"
     x="45.474354"
      y="493.31262"
     id="text58">analytics turnaround for fraud, operations, and marketing.</text>
  <text
     class="body"
     x="45.474354"
      y="506.41266"
     id="text60">Built an anti-fraud system that identified 51,000+</text>
  <text
     class="body"
     x="45.474354"
      y="519.51263"
     id="text61">suspicious clusters across 2.2M+ users, preventing</text>
  <text
     class="body"
     x="45.474354"
      y="532.61267"
