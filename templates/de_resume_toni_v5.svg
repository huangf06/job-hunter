     id="text6">BIO</text>
  <text
     class="bio"
     x="45.830002"
     y="104.3"
     id="text7"><tspan
       id="tspan6">Data Engineer with 9 years of experience building data platforms, pipelines, and decision systems end to end.</tspan></text>
  <text
     class="bio"
     x="45.830002"
     y="117.39999"
     id="text8"><tspan
       id="tspan7">Strong at breaking down complex problems from first principles, designing reliable architectures, and turning</tspan></text>
  <text
     class="bio"
     x="45.830002"
     y="130.5"
     id="text9"><tspan
       id="tspan8">ideas into working solutions. M.Sc. in Artificial Intelligence; Databricks Certified Data Engineer Professional.</tspan></text>
  <text
     class="section"
     x="45.474354"
     y="151"
     id="text23">EXPERIENCE</text>
  <text
     x="45.474354"
     y="167.91266"
     id="text25"><tspan
       class="org"
       id="tspan23">GLP Technology</tspan><tspan
       class="place"
       id="tspan24">, Shanghai -</tspan><tspan
       class="role"
       id="tspan25">Lead Data Engineer</tspan></text>
  <text
     class="date"
     x="45.474354"
     y="179.91266"
     id="text26">JULY 2017 - AUGUST 2019</text>
  <text
     class="body"
     x="45.474354"
     y="192.71265"
     id="text27">First data hire at a fintech startup; built the credit risk</text>
  <text
     class="body"
     x="45.474354"
     y="205.81265"
     id="text28">data platform from scratch, covering ingestion,</text>
  <text
     class="body"
     x="45.474354"
     y="218.91266"
     id="text28b">automated decisioning, and monitoring.</text>
  <text
     class="body"
     x="45.474354"
     y="232.01266"
     id="text31">Developed daily ETL pipelines loading 30+ production</text>
  <text
     class="body"
     x="45.474354"
     y="245.11267"
     id="text32">tables into AWS Redshift; transformed nested credit</text>
  <text
     class="body"
     x="45.474354"
     y="258.21265"
     id="text33">bureau JSON data into 5 structured analytical tables.</text>
  <text
     class="body"
     x="45.474354"
     y="271.31268"
     id="text34">Engineered a production decision engine with 29 rules</text>
  <text
     class="body"
     x="45.474354"
     y="284.41266"
     id="text35">spanning 4 risk dimensions and 36 customer segments,</text>
  <text
     class="body"
     x="45.474354"
     y="297.51266"
     id="text36">supported by an early-delinquency scorecard.</text>
  <text
     class="body"
     x="45.474354"
     y="312.51266"
     id="text38"><tspan
       x="45.474354"
       dy="0"
       id="tspan28"><tspan
   style="font-weight:700"
   id="tspan27">Tech Skills:</tspan> Python, SQL, PySpark, AWS, Airflow</tspan></text>
  <text
     x="45.474354"
      y="332.11267"
     id="text41"><tspan
       class="org"
       id="tspan39">BQ Investment</tspan><tspan
       class="place"
       id="tspan40">, Beijing -</tspan><tspan
       class="role"
       id="tspan41">Quantitative Developer</tspan></text>
  <text
     class="date"
     x="45.474354"
      y="344.11267"
     id="text42">JULY 2015 - JUNE 2017</text>
  <text
     class="body"
     x="45.474354"
      y="356.91266"
     id="text43">Built market data pipelines processing 3,000+ securities</text>
  <text
     class="body"
     x="45.474354"
      y="370.01263"
     id="text44">and 5+ years of tick-level futures data from multiple</text>
  <text
     class="body"
     x="45.474354"
      y="383.11267"
     id="text45">vendor feeds; implemented deduplication, completeness</text>
  <text
     class="body"
     x="45.474354"
      y="396.21265"
     id="text46">checks, and cross-source validation to ensure data</text>
  <text
     class="body"
     x="45.474354"
      y="409.31268"
     id="text46b">integrity for downstream research and trading.</text>
  <text
     class="body"
