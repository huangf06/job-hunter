  <text
     class="body"
     x="42"
     y="234.5"
     id="text18"></text>
  <text
     class="body"
     x="42"
     y="250.5"
     id="text19">Led automated underwriting:</text>
  <text
     class="body"
     x="42"
     y="263.5"
     id="text20"><tspan
   style="font-weight:bold"
   id="tspan20a">built</tspan> 29 rejection rules, 36 borrower</text>
  <text
     class="body"
     x="42"
     y="276.5"
     id="text21">segments, and a 19-feature scorecard estimating first-</text>
  <text
     class="body"
     x="42"
     y="289.5"
     id="text22">payment default risk for approve/reject lending</text>
  <text
     class="body"
     x="42"
     y="302.5"
     id="text23">decisions.</text>
  <text
     class="body"
     x="42"
     y="318.5"
     id="text24">Built the data layer behind risk modeling and monitoring:</text>
  <text
     class="body"
     x="42"
     y="331.5"
     id="text25">ran daily ETL from 30+ production tables into</text>
  <text
     class="body"
     x="42"
     y="344.5"
     id="text26">Redshift and normalized bureau JSON into</text>
  <text
     class="body"
     x="42"
     y="357.5"
     id="text27">5 structured tables for feature generation and risk monitoring.</text>
  <text
     class="body"
     x="42"
     y="373.5"
     id="text28"><tspan
   class="body-bold"
   id="tspan28">Skills:</tspan> Python, SQL, PySpark, AWS, Redshift, Airflow</text>
  <text
