       dx="4"
       id="tspan12">-</tspan><tspan
       class="role"
       dx="4"
       id="tspan13">Data Scientist &amp; Team Lead</tspan></text>
  <text
     class="date"
     x="42"
     y="182.5"
     id="text14">JULY 2017 - AUGUST 2019</text>
  <text
     class="body"
     x="42"
     y="195.5"
     id="text15">First data hire at a consumer lending startup; built the</text>
  <text
     class="body"
     x="42"
     y="208.5"
     id="text16">production decision stack spanning data pipelines,</text>
  <text
     class="body"
     x="42"
