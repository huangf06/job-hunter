   style="font-weight:bold"
   id="tspan33a">14.6% annualized return</tspan> with real capital.</text>
  <text
     class="body"
     x="42"
     y="463.5"
     id="text35">Built research infrastructure for market data, factor</text>
  <text
     class="body"
     x="42"
     y="476.5"
     id="text36">computation, and backtesting across 3,000+</text>
  <text
     class="body"
     x="42"
     y="489.5"
