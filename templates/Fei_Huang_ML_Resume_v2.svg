  <text class="section" x="42" y="84.5" id="text7">BIO</text>
  <text class="bio" x="42" y="99.5" id="text8"><tspan style="font-weight:bold" id="tspan1">ML Engineer</tspan> with 6+ years spanning production decision systems, quantitative modeling, and</text>
  <text class="bio" x="42" y="111.5" id="text9">applied AI projects. Built credit decisioning systems in fintech, developed live trading strategies,</text>
  <text class="bio" x="42" y="123.5" id="text10">and shipped LLM-powered applications from model setup and prompt design to web deployment.</text>
  <text class="bio" x="42" y="135.5" id="text10a">M.Sc. in Artificial Intelligence from VU Amsterdam, with thesis research on uncertainty quantification in Deep RL.</text>

  <text class="section" x="42" y="156.5" id="text11">EXPERIENCE</text>
  <text x="42" y="171.5" id="text13"><tspan class="org" id="tspan11">GLP Technology (Fintech)</tspan><tspan class="place" dx="4" id="tspan12">-</tspan><tspan class="role" dx="4" id="tspan13">Data Scientist &amp; Team Lead</tspan></text>
  <text class="date" x="42" y="182.5" id="text14">JULY 2017 - AUGUST 2019</text>
  <text class="body" x="42" y="195.5" id="text15">First technical hire at a lending fintech; built the credit</text>
  <text class="body" x="42" y="208.5" id="text16">risk platform from data ingestion through automated</text>
  <text class="body" x="42" y="221.5" id="text17">decisioning and post-loan monitoring.</text>
  <text class="body" x="42" y="237.5" id="text18">Engineered the core decision engine: 29 rejection rules</text>
  <text class="body" x="42" y="250.5" id="text19">across 4 risk dimensions, 36 borrower segments, and a</text>
  <text class="body" x="42" y="263.5" id="text20">19-feature scorecard for first-payment default prediction.</text>
  <text class="body" x="42" y="279.5" id="text21">Extended the platform with delinquency tracking,</text>
  <text class="body" x="42" y="292.5" id="text22">repayment trend analysis, and first-repayment early warning.</text>
  <text class="body" x="42" y="308.5" id="text23"><tspan class="body-bold" id="tspan28">Skills:</tspan> Python, SQL, AWS, Redshift, Airflow, pandas, NumPy</text>

  <text x="42" y="426.5" id="text29"><tspan class="org" id="tspan29">BQ Investment (Hedge Fund)</tspan><tspan class="place" dx="4" id="tspan30">-</tspan><tspan class="role" dx="4" id="tspan31">Quantitative Researcher</tspan></text>
  <text class="date" x="42" y="437.5" id="text30">JULY 2015 - JUNE 2017</text>
  <text class="body" x="42" y="450.5" id="text31">Developed and deployed an R-Breaker intraday trading</text>
  <text class="body" x="42" y="463.5" id="text32">strategy for CSI index futures from research through live</text>
  <text class="body" x="42" y="476.5" id="text33">production, achieving <tspan style="font-weight:bold" id="tspan33a">14.6% annualized return</tspan> with real capital.</text>
  <text class="body" x="42" y="492.5" id="text35">Built a factor research pipeline applying Fama-MacBeth</text>
  <text class="body" x="42" y="505.5" id="text36">regression to validate 4 factor families across 3,000+</text>
  <text class="body" x="42" y="518.5" id="text37">securities; validated factors were deployed in the fund's</text>
  <text class="body" x="42" y="531.5" id="text38">live portfolio construction.</text>
  <text class="body" x="42" y="547.5" id="text40"><tspan class="body-bold" id="tspan44">Skills:</tspan> Python, MATLAB, SQL, NumPy, pandas, scipy</text>

  <text x="42" y="626.5" id="text45"><tspan class="org" id="tspan45">Ele.me (Alibaba Group)</tspan><tspan class="place" dx="4" id="tspan46">-</tspan><tspan class="role" dx="4" id="tspan47">Data Analyst</tspan></text>
  <text class="date" x="42" y="637.5" id="text46">SEPTEMBER 2013 - JULY 2015</text>
  <text class="body" x="42" y="650.5" id="text47">Built an anti-fraud detection system identifying <tspan style="font-weight:bold" id="tspan47a">51,000+</tspan></text>
  <text class="body" x="42" y="663.5" id="text48">suspicious order clusters across <tspan style="font-weight:bold" id="tspan48a">2.2M+ users</tspan> using 3</text>
  <text class="body" x="42" y="676.5" id="text49">pattern algorithms during hyper-growth at Ele.me.</text>
  <text class="body" x="42" y="692.5" id="text50">Optimized 90+ Hadoop/Hive queries, cutting scan volume</text>
  <text class="body" x="42" y="705.5" id="text51"><tspan style="font-weight:bold" id="tspan54a">5x</tspan> (500GB to 100GB) across 30+ warehouse tables.</text>
  <text class="body" x="42" y="721.5" id="text52"><tspan class="body-bold" id="tspan57">Skills:</tspan> SQL, Hadoop, Hive, Python, pandas, A/B Testing</text>
  <text x="42" y="745.5" id="text52a"><tspan class="org" id="tspan52a">Independent Quantitative Researcher</tspan><tspan class="place" dx="4" id="tspan52b">-</tspan><tspan class="role" dx="4" id="tspan52c">Remote</tspan></text>
  <text class="date" x="42" y="756.5" id="text52d">SEPTEMBER 2019 - AUGUST 2023</text>
  <text class="body" x="42" y="769.5" id="text52e">Built automated equity research pipeline processing 83K+</text>
  <text class="body" x="42" y="782.5" id="text52f">daily records across 3,600+ stocks via Tushare API and</text>
  <text class="body" x="42" y="795.5" id="text52g">MySQL; tracked institutional flow and momentum signals.</text>

  <text class="section" x="326" y="158.5" id="text58">EDUCATION</text>
  <text x="326" y="173.5" id="text59"><tspan class="org" id="tspan59">Vrije Universiteit Amsterdam</tspan></text>
  <text x="326" y="187" id="text60"><tspan class="role" id="tspan60">M.Sc. in Artificial Intelligence (GPA: 8.2/10)</tspan></text>
  <text class="date" x="326" y="200.5" id="text61">SEPTEMBER 2023 - AUGUST 2025</text>
  <text class="body" x="326" y="216" id="text62">Thesis: Uncertainty Quantification in Deep RL</text>
  <text class="body" x="326" y="229" id="text63">Built an evaluation framework across 3 methods, 5</text>
  <text class="body" x="326" y="242" id="text64">environments, and 150 training runs.</text>
  <text class="body" x="326" y="255" id="text64a">Discovered a <tspan style="font-weight:bold" id="tspan63a">noise paradox</tspan>: moderate observation noise</text>
  <text class="body" x="326" y="268" id="text64b">unexpectedly improved ensemble-based uncertainty estimates.</text>
  <text x="326" y="289" id="text65"><tspan class="org" id="tspan65">Tsinghua University</tspan></text>
  <text x="326" y="304" id="text66"><tspan class="role" id="tspan66">B.Eng. in Industrial Engineering</tspan></text>
  <text class="date" x="326" y="317.5" id="text67">SEPTEMBER 2006 - JULY 2010</text>

  <text class="section" x="326" y="342" id="text68">PROJECTS</text>
  <text x="326" y="357" id="text69"><tspan class="org" id="tspan69">Poem Generator</tspan></text>
  <text class="date" x="326" y="369.5" id="text70">2024</text>
  <text class="body" x="326" y="384" id="text71">Developed an LLM-powered text generation app using</text>
  <text class="body" x="326" y="397" id="text72">GPT-2 and Hugging Face Transformers; designed prompt</text>
  <text class="body" x="326" y="410" id="text73">controls for style variation and deployed the system as</text>
  <text class="body" x="326" y="423" id="text74">an interactive web application via Flask.</text>
  <text class="body" x="326" y="436" id="text75"><tspan class="body-bold" id="tspan77">Skills:</tspan> Python, GPT-2, Hugging Face, Prompt Engineering, Flask</text>

  <text x="326" y="460" id="text78"><tspan class="org" id="tspan78">Expedia Hotel Recommendation</tspan></text>
  <text class="date" x="326" y="472.5" id="text79">APRIL 2024 - MAY 2024</text>
  <text class="body" x="326" y="487" id="text80">Built a hotel recommendation system using LightGBM</text>
  <text class="body" x="326" y="500" id="text81">LambdaRank on 4.96M Expedia search records; engineered</text>
  <text class="body" x="326" y="513" id="text82">temporal, behavioral, and aggregation features and achieved</text>
  <text class="body" x="326" y="526" id="text83"><tspan style="font-weight:bold" id="tspan83a">NDCG@5 = 0.392</tspan>, ranking near the top of a 200-person Kaggle field.</text>
  <text class="body" x="326" y="539" id="text84"><tspan class="body-bold" id="tspan86">Skills:</tspan> LightGBM, Learning-to-Rank, Feature Engineering</text>

  <text x="326" y="563" id="text84a"><tspan class="org" id="tspan84a">ML for Quantified Self: IMU Sensor Classification</tspan></text>
  <text class="date" x="326" y="575.5" id="text84b">SEPTEMBER 2024 - DECEMBER 2024</text>
  <text class="body" x="326" y="590" id="text84c">Built an end-to-end ML pipeline for multi-sensor IMU data</text>
  <text class="body" x="326" y="603" id="text84d">using Kalman filtering, FFT-based feature engineering,</text>
  <text class="body" x="326" y="616" id="text84e">LightGBM, and Bidirectional LSTM; engineered <tspan style="font-weight:bold" id="tspan84e">576+</tspan></text>
  <text class="body" x="326" y="629" id="text84f">features and achieved <tspan style="font-weight:bold" id="tspan84f">65%</tspan> person accuracy / <tspan style="font-weight:bold" id="tspan84g">94-99%</tspan> sex accuracy.</text>
  <text class="body" x="326" y="642" id="text84h"><tspan class="body-bold" id="tspan84h">Skills:</tspan> Python, LightGBM, PyTorch, Optuna, Kalman Filter</text>

  <text class="section" x="326" y="667.5" id="text87">TECHNICAL SKILLS</text>
  <text class="body" x="326" y="682.5" id="text88"><tspan class="body-bold" id="tspan88">ML &amp; LLMs:</tspan> PyTorch, scikit-learn, LightGBM, XGBoost, GPT-2,</text>
  <text class="body" x="326" y="695.5" id="text89">Hugging Face Transformers, Prompt Engineering, Deep RL</text>
  <text class="body" x="326" y="711.5" id="text90"><tspan class="body-bold" id="tspan89">Programming:</tspan> Python, SQL, MATLAB, Bash</text>
  <text class="body" x="326" y="727.5" id="text91"><tspan class="body-bold" id="tspan91">Data &amp; Infrastructure:</tspan> AWS, Redshift, Airflow, Hadoop, Hive, Docker, Git</text>
  <text class="body" x="326" y="743.5" id="text92"><tspan class="body-bold" id="tspan93">Modeling &amp; Analytics:</tspan> Fama-MacBeth, Backtesting,</text>
  <text class="body" x="326" y="756.5" id="text93a">Learning-to-Rank, Statistical Testing, A/B Testing, Time-Series Analysis</text>

  <text class="section" x="326" y="785" id="text94">LANGUAGES</text>
  <text class="body" x="326" y="800" id="text95"><tspan x="326" id="tspan95a">English - Fluent</tspan><tspan x="404" id="tspan95b">|</tspan><tspan x="420" id="tspan95c">Mandarin - Native</tspan></text>
</svg>
