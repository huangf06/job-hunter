  <text
     class="bio"
     x="42"
     y="99.5"
     id="text8"><tspan
   style="font-weight:bold"
   id="tspan1">Machine Learning Engineer</tspan> with 6+ years building production decision systems across fintech, trading, and e-commerce.</text>
  <text
     class="bio"
     x="42"
     y="111.5"
     id="text9">Combines data infrastructure, feature-building, and model-driven logic for risk, fraud, and portfolio workflows.</text>
