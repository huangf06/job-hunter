     id="text6">BIO</text>
  <text
     class="bio"
     x="45.830002"
     y="104.3"
     id="text7"><tspan
       id="tspan6">Data Engineer with production experience building ETL pipelines, data platforms, and automated</tspan></text>
  <text
     class="bio"
     x="45.830002"
     y="117.39999"
     id="text8"><tspan
       id="tspan7">decisioning systems across fintech, e-commerce, and supply chain. Recently completed M.Sc. in AI</tspan></text>
  <text
     class="bio"
     x="45.830002"
     y="130.5"
     id="text9"><tspan
       id="tspan8">(VU Amsterdam, 8.2 GPA), adding modern ML systems context to production data engineering experience.</tspan></text>
  <text
     class="section"
     x="45.474354"
     y="151"
     id="text23">EXPERIENCE</text>
  <text
     x="45.474354"
     y="167.91266"
     id="text25"><tspan
       class="org"
       id="tspan23">GLP Technology (Fintech)</tspan><tspan
       class="place"
       id="tspan24"> -</tspan><tspan
       class="role"
       id="tspan25">Lead Data Engineer</tspan></text>
  <text
     class="date"
     x="45.474354"
     y="179.91266"
     id="text26">JULY 2017 - AUGUST 2019</text>
  <text
     class="body"
     x="45.474354"
     y="192.71265"
     id="text27">Designed and deployed a credit risk data platform on</text>
  <text
     class="body"
     x="45.474354"
     y="205.81265"
     id="text28">AWS Redshift, ingesting 30+ production tables daily via</text>
  <text
     class="body"
     x="45.474354"
     y="218.91266"
     id="text28b">Airflow-orchestrated ETL pipelines.</text>
  <text
     class="body"
     x="45.474354"
     y="232.01266"
     id="text31">Developed daily ETL pipelines loading 30+ production</text>
  <text
     class="body"
     x="45.474354"
     y="245.11267"
     id="text32">tables into AWS Redshift; transformed nested credit</text>
  <text
     class="body"
     x="45.474354"
     y="258.21265"
     id="text33">bureau JSON data into 5 structured analytical tables.</text>
  <text
     class="body"
     x="45.474354"
     y="271.31268"
     id="text34">Engineered a production decision engine with 29 rules</text>
  <text
     class="body"
     x="45.474354"
     y="284.41266"
     id="text35">spanning 4 risk dimensions and 36 customer segments,</text>
  <text
     class="body"
     x="45.474354"
     y="297.51266"
     id="text36">supported by an early-delinquency scorecard.</text>
  <text
     class="body"
     x="45.474354"
     y="312.51266"
     id="text38"><tspan
       x="45.474354"
       dy="0"
       id="tspan28"><tspan
   style="font-weight:700"
   id="tspan27">Tech Skills:</tspan> Python, SQL, PySpark, AWS, Airflow</tspan></text>
  <text
