     id="text42">JULY 2015 - JUNE 2017</text>
  <text
     class="body"
     x="45.474354"
      y="356.91266"
     id="text43">Built market data pipelines ingesting 3,000+ securities</text>
  <text
     class="body"
     x="45.474354"
      y="370.01263"
     id="text44">and 5+ years of tick-level futures data from multiple</text>
  <text
     class="body"
     x="45.474354"
      y="383.11267"
     id="text45">vendor feeds; implemented deduplication, completeness</text>
  <text
     class="body"
     x="45.474354"
      y="396.21265"
     id="text46">checks, and cross-source validation to ensure data</text>
  <text
     class="body"
     x="45.474354"
      y="409.31268"
     id="text46b">quality for downstream research and trading systems.</text>
  <text
     class="body"
