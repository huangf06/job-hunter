  <text
     class="date"
     x="45.474354"
     y="305.91266"
     id="text26">JULY 2017 - AUGUST 2019</text>
  <text
     class="body"
     x="45.474354"
     y="318.71265"
     id="text27">Joined a lending fintech as its first technical data hire;</text>
  <text
     class="body"
     x="45.474354"
     y="331.81265"
     id="text28">built the credit risk data platform from scratch, from</text>
  <text
     class="body"
     x="45.474354"
     y="344.91266"
     id="text29">ingestion and transformation to automated decisioning</text>
  <text
     class="body"
     x="45.474354"
     y="358.01266"
     id="text30">and post-loan monitoring.</text>
  <text
     class="body"
     x="45.474354"
     y="371.11267"
     id="text31">Built daily ETL for 30+ production tables into AWS</text>
  <text
     class="body"
     x="45.474354"
     y="384.21265"
     id="text32">Redshift and transformed nested bureau JSON into 5</text>
  <text
     class="body"
     x="45.474354"
     y="397.31268"
     id="text33">structured analytical tables.</text>
  <text
     class="body"
     x="45.474354"
     y="410.41266"
     id="text34">Engineered the production decision layer with 29 rules</text>
  <text
     class="body"
     x="45.474354"
     y="423.51263"
     id="text35">across 4 risk dimensions, 36 borrower segments, and</text>
  <text
     class="body"
     x="45.474354"
     y="436.61267"
     id="text36">an early-delinquency scorecard.</text>
  <text
     class="body"
