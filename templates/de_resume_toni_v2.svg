  <text
     class="body"
     x="45.474354"
     y="672.01263"
     id="text59">on 30+ warehouse tables for fraud detection,</text>
  <text
     class="body"
     x="45.474354"
     y="685.11267"
     id="text59b">operations, and marketing teams.</text>
  <text
     class="body"
     x="45.474354"
     y="698.21265"
     id="text60">Built anti-fraud detection system identifying 51,000+</text>
  <text
     class="body"
     x="45.474354"
     y="711.31268"
     id="text61">suspicious order clusters across 2.2M+ users using 3</text>
  <text
     class="body"
