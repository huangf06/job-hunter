# LinkedIn Job Search Configuration v2.1
# ======================================
# 7-group strategy optimized for Fei's background:
# - 6 years exp: data pipelines + ML systems + quant research
# - Core skills: Python, SQL, Spark, PyTorch, data engineering
# - Target: Data Engineer / ML Engineer / Analytics Engineer

defaults:
  location: "Netherlands"
  date_posted: "r86400"      # Past 24 hours (daily mode). Use r604800 for weekly catch-up
  dedup_window_days: 30       # Only dedup against jobs scraped in the last N days; older jobs get re-scraped
  job_type: "F"              # F=Full-time (LinkedIn 2026 update: only Full-time for visa sponsorship)
  # workplace_type removed: LinkedIn 2026 update - new UI only has "Remote" toggle, no Hybrid/On-site split
  # Leaving unset to capture all workplace types (Remote, Hybrid, On-site)
  sort_by: "DD"              # DD=Date, R=Relevance
  language: "en"             # M1: f_JC=en filters English-language postings (Dutch detection remains as fallback)
  max_jobs: 999

# Search profiles
profiles:
  # ============================================================
  # Group 1: Data Engineering Core (PRIMARY TARGET)
  # ============================================================
  data_engineering:
    name: "Data Engineering Core"
    enabled: true
    priority: 0
    queries:
      - keywords: '"Data Engineer" OR "Analytics Engineer" OR "Data Platform Engineer" OR "ETL Engineer"'
        description: "Data pipeline & platform roles"
      - keywords: '"Data Infrastructure Engineer" OR "MLOps Engineer" OR "ML Platform Engineer" OR "Pipeline Engineer" OR "Python Developer" OR "Python Engineer"'
        description: "Data infrastructure, ML platform & Python roles"

    iamexpat:
      queries:
        - keywords: "data engineer"
        - keywords: "analytics engineer"
        - keywords: "data platform engineer"
        - keywords: "mlops engineer"
        - keywords: "ml platform engineer"
        - keywords: "data infrastructure engineer"
        - keywords: "pipeline engineer"
        - keywords: "python developer"
        - keywords: "python engineer"

  # ============================================================
  # Group 2: ML Engineering (DIFFERENTIATION)
  # ============================================================
  ml_engineering:
    name: "ML Engineering"
    enabled: true
    priority: 0
    queries:
      - keywords: '"Machine Learning Engineer" OR "ML Engineer" OR "AI Engineer" OR "AI Software Engineer" OR "GenAI Engineer" OR "Generative AI Engineer"'
        description: "ML systems, AI software & GenAI roles"

    iamexpat:
      queries:
        - keywords: "machine learning engineer"
        - keywords: "ml engineer"
        - keywords: "mlops engineer"
        - keywords: "genai engineer"
        - keywords: "generative ai engineer"

  # ============================================================
  # Group 3: Backend Engineering (FALLBACK)
  # ============================================================
  backend_engineering:
    name: "Backend Engineering"
    enabled: false   # M2: 0% interview rate (0/1205 scraped), Backend template not enabled
    priority: 2
    queries:
      - keywords: '"Backend Engineer" OR "Python Developer" OR "Software Engineer"'
        description: "General backend & Python roles"

    iamexpat:
      queries:
        - keywords: "python developer"
        - keywords: "backend engineer"
        - keywords: "software engineer"

  # ============================================================
  # Group 4: Data Science & Analytics (EDGE CASE)
  # ============================================================
  data_science:
    name: "Data Science"
    enabled: true
    priority: 2
    queries:
      - keywords: '"Data Scientist"'
        description: "Data science roles"
      # M2: removed "Data Analyst" (underleveled), "BI Engineer" (underleveled),
      #     "Data Consultant" (consulting firms, need local language)

    iamexpat:
      queries:
        - keywords: "data scientist"

  # ============================================================
  # Group 5: Quantitative (HIGH VALUE)
  # ============================================================
  quant:
    name: "Quantitative & Trading"
    enabled: true    # Re-enabled: 36.4% hit rate (highest), 2 interviews. Greenhouse only covers Optiver+Flow Traders, misses IMC/Jump/Barak etc.
    priority: 3
    queries:
      - keywords: '"Quantitative Researcher" OR "Quantitative Developer" OR "Quantitative Analyst" OR "Quant Trader"'
        description: "Quant & trading roles"

    iamexpat:
      queries:
        - keywords: "quantitative"

  # ============================================================
  # Group 6: ML Research (ACADEMIC/RESEARCH-ORIENTED)
  # ============================================================
  ml_research:
    name: "ML Research & Applied Science"
    enabled: true
    priority: 1
    queries:
      - keywords: '"Machine Learning Researcher" OR "Research Engineer" OR "Research Software Engineer" OR "Applied Scientist" OR "Research Scientist"'
        description: "ML research & applied science roles"
      - keywords: '"Deep Learning" OR "Computer Vision" OR "NLP" OR "LLM" OR "Agentic AI"'
        description: "Specialized ML research areas & emerging AI"

    iamexpat:
      queries:
        - keywords: "machine learning researcher"
        - keywords: "research scientist"
        - keywords: "applied scientist"
        - keywords: "research engineer"
        - keywords: "research software engineer"

  # ============================================================
  # Group 7: Backend + AI/Data Context (INTERVIEW-PROVEN)
  # ============================================================
  backend_ai_data:
    name: "Software Engineer - AI/Data Focus"
    enabled: true
    priority: 1                      # P1: 2 interviews (Source.ag, TomTom)
    daemon_interval_minutes: 120     # Every 2 hours
    queries:
      - keywords: '"Software Engineer" AND ("Data" OR "AI" OR "Machine Learning" OR "Platform")'
        description: "Software engineer roles with data/AI context"

    iamexpat:
      queries:
        - keywords: "software engineer data"
        - keywords: "software engineer ai"

# Company blacklist (recruiting agencies, outsourcing, etc.)
company_blacklist:
  - "Hays"
  - "Randstad"
  - "Michael Page"
  - "Robert Half"
  - "Brunel"
  - "Experis"

# Title blacklist keywords (exclude irrelevant positions)
title_blacklist:
  - "intern"
  - "internship"
  - "student"
  - "trainee"
  - "werkstudent"

# Legacy priority rules (NOT consumed by any v2.0 code — see config/base/scoring.yaml for active scoring)
priority_rules:
  high:
    title_contains:
      - "senior"
      - "lead"
      - "staff"
      - "principal"
      - "quant"
      - "machine learning"
      - "ai engineer"
    company_contains:
      - "Optiver"
      - "Flow Traders"
      - "IMC"
      - "Booking"
      - "Adyen"
      - "ASML"
  low:
    title_contains:
      - "junior"
      - "entry"
      - "graduate"
