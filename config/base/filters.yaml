# =============================================================================
# 硬性筛选规则配置 v3.0 — whitelist-only design
# =============================================================================
# 规则按 priority 顺序执行，匹配任一规则即被拒绝
# 支持正则表达式和计数检测
# =============================================================================

hard_reject_rules:
  # 规则1: 荷兰语JD检测 (最高优先级)
  dutch_language:
    enabled: true
    priority: 0
    type: "word_count"  # 使用词频检测而非正则
    description: "JD written primarily in Dutch"
    dutch_indicators:
      - "jij"
      - "wij"
      - "jouw"
      - "onze"
      - "voor"
      - "binnen"
      - "werken"
      - "ervaring"
      - "kennis"
      - "verantwoordelijk"
      - "samenwerken"
      - "ontwikkeling"
      - "oplossingen"
      - "omgeving"
      - "projecten"
      - "systemen"
      - "kwaliteit"
      - "vacature"
      - "functie"
      - "afdeling"
      - "organisatie"
      - "werkzaamheden"
      - "vereisten"
      - "beschikbaar"
      - "naar"
      - "zijn"
      - "het"
      - "deze"
      - "meer"
      - "bieden"
    threshold: 7  # >= 7 Dutch words found = reject

  # 规则1b: 法语JD检测 (Greenhouse 无语言过滤)
  french_language:
    enabled: true
    priority: 0
    type: "word_count"
    description: "JD written primarily in French"
    indicators:
      - "nous"
      - "vous"
      - "notre"
      - "votre"
      - "pour"
      - "dans"
      - "avec"
      - "cette"
      - "sont"
      - "avoir"
      - "responsable"
      - "entreprise"
      - "poste"
      - "missions"
      - "profil"
      - "candidat"
      - "connaissance"
      - "environnement"
      - "gestion"
      - "developper"
    threshold: 8

  # 规则1c: 德语JD检测 (Greenhouse 无语言过滤)
  german_language:
    enabled: true
    priority: 0
    type: "word_count"
    description: "JD written primarily in German"
    indicators:
      - "wir"
      - "und"
      - "eine"
      - "oder"
      - "ihre"
      - "unser"
      - "erfahrung"
      - "anforderungen"
      - "aufgaben"
      - "entwicklung"
      - "kenntnisse"
      - "umfeld"
      - "verantwortung"
      - "stelle"
      - "stellenangebot"
      - "berufserfahrung"
      - "mitarbeiter"
      - "unternehmen"
      - "bereich"
      - "arbeiten"
    threshold: 8

  # 规则2: 明确要求荷兰语能力
  dutch_required:
    enabled: true
    priority: 1
    type: "regex"
    patterns:
      - "dutch\\s*speak"
      - "nederlandstalig"
      - "dutch\\s*(required|mandatory|essential|native|fluent)"
      - "nederlands\\s*(verplicht|vereist|moeder.*taal|vloeiend)"
      - "fluency\\s+in\\s+dutch"
      - "dutch\\s*language\\s*proficiency"
    description: "职位要求荷兰语能力"

  # 规则3: 非目标岗位类型 (仅检查标题)
  non_target_role:
    enabled: true
    priority: 2
    type: "title_check"
    description: "Job title doesn't match any target role category"
    # 标题必须包含至少一个目标关键词 (否则被拒)
    title_must_contain_one_of:
      - "data"
      - "dataflow"
      - "machine learning"
      - "ml"
      - "ai"
      - "genai"
      - "artificial intelligence"
      - "computer vision"
      - "machine vision"
      - "vision"
      - "python"
      - "quant"
      - "quantitative"
      - "analytics"
      - "bi"
      - "scientist"
      - "research"
      - "researcher"
      - "algorithm"
      - "deep learning"
      - "nlp"
      - "llm"
      - "mlops"
      - "software engineer"
      - "software developer"
      - "backend"
      - "infrastructure engineer"
      - "data infrastructure"
      - "ml infrastructure"
      - "platform engineer"
      - "data platform"
      - "ml platform"
      - "pipeline"
      - "applied scientist"

  # 规则4: 非目标技术栈 (分标题和正文检查)
  wrong_tech_stack:
    enabled: true
    priority: 3
    type: "tech_stack"
    description: "Primary tech stack doesn't match candidate skills"
    # 标题中出现以下模式直接拒绝
    title_patterns:
      - "\\b(flutter|swift|kotlin|scala)\\s*(developer|engineer)\\b"
      - "\\b(android|ios|mobile)\\s*(developer|engineer)\\b"
      - "\\b(frontend|front-end|front end|ui/ux)\\s*(developer|engineer)\\b"
      - "\\b(devops|sre|site reliability)\\s*(engineer)\\b"
      - "\\bdotnet\\b|\\.net(?!\\w)|\\bc#(?!\\w)"
      - "\\bjava\\b(?!.*(?:script|data|ml|machine learning|ai))"
      - "\\bruby\\b"
      - "\\breact\\b.*\\b(developer|engineer)\\b"
      - "\\bangular\\b.*\\b(developer|engineer)\\b"
    # 如果标题也包含这些词，不拒绝 (例外)
    exceptions:
      - "data"
      - "machine learning"
      - "ml"
      - "ai"
      - "quant"
      - "scientist"
      - "research"
      - "analytics"

  # 规则5: 仅限自由职业/ZZP
  freelance_zzp:
    enabled: true
    priority: 4
    type: "regex"
    description: "Freelance or ZZP contract only"
    patterns:
      - "\\bzzp\\b"
      - "\\bkvk\\s*registration\\s*required\\b"
      - "\\bfreelance\\s*(only|contract|position)\\b"
      - "\\b\\d+\\s*(?:euro|eur|\\$|usd).{0,15}per\\s*(day|hour)\\b"
      - "\\bday\\s*rate\\b"
    exceptions:
      - "full-time"
      - "permanent"
      - "salary"

  # 规则6: 极低薪酬
  low_compensation:
    enabled: true
    priority: 5
    type: "regex"
    description: "Compensation far below market rate"
    patterns:
      - "\\$1[0-4]00.*per\\s*month"
      - "\\$1500.*per\\s*month"
      - "\\$2[0-5]00.*per\\s*month"
      - "USD\\s*1[0-5]00"
      - "1[0-4]00\\s*usd\\s*per\\s*month"
      - "€\\s*1[0-4]00.*per\\s*month"
      - "EUR\\s*1[0-5]00.*per\\s*month"
      - "1[0-4]00\\s*eur\\s*per\\s*month"

  # 规则7: PhD 硬性要求 (M3)
  phd_required:
    enabled: true
    priority: 6
    type: "regex"
    description: "JD requires PhD without 'or equivalent/Master' escape"
    patterns:
      # "PhD required" / "PhD is required" / "PhD mandatory" without nearby "or equivalent/master"
      - "\\bphd\\s+(required|is\\s+required|mandatory|is\\s+mandatory)\\b(?!.{0,200}(or\\s+equivalent|or\\s+master|or\\s+msc|or\\s+m\\.?sc|advanced\\s+degree|master.*with.*relevant|master.*with.*experience))"
      # "requires a PhD" / "require a PhD" without nearby exception
      - "\\brequires?\\s+a?\\s*\\bphd\\b(?!.{0,200}(or\\s+equivalent|or\\s+master|or\\s+msc|or\\s+m\\.?sc|advanced\\s+degree|master.*with.*relevant|master.*with.*experience))"
      # "must have a PhD" / "must hold a PhD" without exception
      - "\\bmust\\s+(have|hold|possess)\\s+a?\\s*\\bphd\\b(?!.{0,200}(or\\s+equivalent|or\\s+master|or\\s+msc|or\\s+m\\.?sc|advanced\\s+degree|master.*with.*relevant|master.*with.*experience))"
    # Do NOT match: "PhD preferred", "PhD is a plus", "PhD or equivalent experience",
    #               "PhD or Master's degree", "PhD or MSc", "PhD or advanced degree"

  # 规则8: 高级管理职位 (title-only check to avoid false-rejecting mid-level roles)
  senior_management:
    enabled: true
    priority: 8
    type: "title_check"
    description: "高级管理或架构师职位"
    title_reject_patterns:
      - "\\b(principal|director|vp|vice president|head of|cto|cio|chief)\\b"
      - "\\bsenior\\b.*\\b(manager|director)\\b"
      - "\\b(lead|senior)\\b.*\\b(engineer|scientist)\\b.*\\b(manager|director)\\b"
    exceptions:
      - "senior data analyst"
      - "senior analyst"
      - "senior data engineer"
      - "senior data scientist"
      - "senior ml engineer"
      - "senior machine learning"
      - "senior ai engineer"
      - "senior research"

# =============================================================================
# 软性筛选规则 (用于评分，不直接拒绝)
# =============================================================================

# NOTE: soft_filter_rules removed in v2.0 — equivalent logic now lives in scoring.yaml
#       (body_scoring: visa_sponsorship, junior_friendly, target_companies, etc.)

