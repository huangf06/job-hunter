# Target companies for direct ATS scraping
# ats: greenhouse
# board_token: company identifier in ATS URL
# location_filter: optional, case-insensitive substring match on job location
#
# To find board tokens:
#   Greenhouse: https://boards-api.greenhouse.io/v1/boards/{token}/jobs
#
# NOTE: Booking.com uses iCIMS (not Greenhouse) — needs custom scraper
# NOTE: Miro uses Greenhouse internally but doesn't expose public Board API
# NOTE: Optiver/Backbase have valid GH boards but post jobs infrequently (0 at time of check)
# NOTE: Uber, Nike, Snowflake, Confluent, HashiCorp, Notion — not on public Greenhouse API

companies:
  # === Greenhouse — NL-headquartered / strong NL presence ===
  - name: Adyen
    ats: greenhouse
    board_token: adyen
    location_filter: "Amsterdam"

  - name: MessageBird
    ats: greenhouse
    board_token: bird
    location_filter: "Netherlands"

