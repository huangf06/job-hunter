templates:
  DE:
    enabled: true
    svg: "templates/Fei_Huang_DE_Resume.svg"
    pdf: "templates/pdf/Fei_Huang_DE.pdf"
    adapt_html: "templates/adapt_de.html"
    target_roles:
      - "data engineer"
      - "data platform"
      - "etl"
      - "pipeline"
      - "big data"
      - "analytics engineer"
      - "bi engineer"
    bio_positioning: "Data Engineer"
    key_strengths:
      - "Spark/Delta Lake"
      - "AWS data stack"
      - "financial domain"
      - "Python"
    weak_areas:
      - "no frontend"
      - "no pure backend API"
      - "no DevOps/K8s emphasis"
    slot_schema:
      bio:
        slot_id: "bio"
        default: "Data Engineer with 6+ years of experience building data platforms across e-commerce, market data, and credit risk. Built end-to-end ingestion, warehousing, data quality, and decisioning systems from the ground up. M.Sc. in Artificial Intelligence. Certified Data Engineer with hands-on experience in Spark and Delta Lake."
      sections:
        - section_id: "experience"
          entries:
            - entry_id: "glp"
              company: "GLP Technology (Fintech)"
              title: "Lead Data Engineer"
              date: "JULY 2017 - AUGUST 2019"
              bullets:
                - slot_id: "glp_1"
                  default: "Built the credit risk data platform from scratch as the founding data engineer, enabling production lending workflows across ingestion, Redshift warehousing, automated decisioning, and post-loan monitoring."
                - slot_id: "glp_2"
                  default: "Developed the core data layer, ingesting 30+ production tables into Redshift and transforming nested credit bureau JSON into 5 normalized analytical tables for downstream risk analysis and decision support."
                - slot_id: "glp_3"
                  default: "Implemented an automated risk decision engine with 29 rejection rules, 36 borrower segments, and a 19-feature scorecard for production credit decisions and first-payment-default assessment."
            - entry_id: "bq"
              company: "BQ Investment (Hedge Fund)"
              title: "Quant Developer"
              date: "JULY 2015 - JUNE 2017"
              bullets:
                - slot_id: "bq_1"
                  default: "Engineered market data pipelines and infrastructure for trading and research workflows, covering 3,000+ securities across 5+ years of tick-level futures data from multiple vendor feeds."
                - slot_id: "bq_2"
                  default: "Implemented data quality controls for deduplication, completeness, and cross-source validation, improving data reliability for downstream analytics and live trading."
            - entry_id: "ele"
              company: "Ele.me (Alibaba Group)"
              title: "Data Analyst"
              date: "SEPTEMBER 2013 - JULY 2015"
              bullets:
                - slot_id: "ele_1"
                  default: "Built anti-fraud detection system identifying 51,000+ suspicious order clusters across 2.2M+ users using 3 pattern-matching algorithms: same-phone, high-frequency, and repeat-order detection."
                - slot_id: "ele_2"
                  default: "Optimized 90+ Hadoop/Hive queries through partition pruning and subquery pushdown, reducing scanned data by 80% (500GB to 100GB) across 30+ warehouse tables."
            - entry_id: "henan"
              company: "Henan Energy Group"
              title: "Business Analyst"
              date: "JULY 2010 - AUGUST 2013"
              bullets:
                - slot_id: "henan_1"
                  default: "Created a pipeline to ingest, validate, and consolidate non-standard Excel reports from 70+ business units, reducing monthly processing time from 2 days to 2 hours."
        - section_id: "projects"
          entries:
            - entry_id: "greenhouse"
              company: "Recent Project"
              title: "Greenhouse Sensor Data Pipeline"
              date: "FEBRUARY 2026"
              bullets:
                - slot_id: "greenhouse_1"
                  default: "Built a PySpark pipeline for a commercial greenhouse operator using medallion architecture, idempotent ingestion, and 6 data quality checks for reliable downstream reporting."
                - slot_id: "greenhouse_2"
                  default: "Implemented 15-minute, hourly, and daily Delta aggregations, handling noisy and schema-changing sensor data while preserving anomalies for monitoring and excluding invalid outputs."
        - section_id: "skills"
          categories:
            - cat_id: "programming"
              default: "Python, SQL, Bash"
            - cat_id: "data_engineering"
              default: "PySpark, Spark, Delta Lake, Databricks, Airflow, Redshift, ETL/ELT, Data Modeling, Data Quality, Structured Streaming, Schema Evolution, Medallion Architecture"
            - cat_id: "infrastructure"
              default: "AWS, Docker, Git, CI/CD"
            - cat_id: "analytics_ml"
              default: "Pandas, NumPy, scikit-learn, PyTorch, A/B Testing, Tableau"

