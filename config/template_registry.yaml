          default: "end-to-end ML pipelines, from raw data through production deployment."
          senior: "Strengths in feature engineering, model evaluation, and end-to-end ML pipelines."
      sections:
        - section_id: "experience"
          entries:
            - entry_id: "glp"
              company: "GLP Technology (Fintech)"
              title: "Data Scientist"
              date: "JULY 2017 - AUGUST 2019"
              technical_skills: "Python, SQL, PySpark, Feature Eng., AWS (Redshift, S3), Airflow"
              bullets:
                - slot_id: "glp_1"
                  default: "Joined as first data hire and built the end-to-end credit risk prediction system: engineered 19 features from raw bureau and transactional data, developed a first-payment default scorecard with 36-segment borrower classification, and deployed the model into production underwriting serving real lending decisions."
                - slot_id: "glp_2"
                  default: "Built the feature pipeline powering all risk models: automated ingestion of 30+ production tables and credit bureau data, transforming raw nested JSON into structured analytical features for model training, scoring, and post-loan monitoring."
            - entry_id: "bq"
              company: "BQ Investment (Hedge Fund)"
              title: "Quant Researcher"
              date: "JULY 2015 - JUNE 2017"
              technical_skills: "Python, SQL, NumPy, pandas, Statistical Modeling"
              bullets:
                - slot_id: "bq_1"
                  default: "Developed and deployed a signal-driven intraday predictive model from research through live production on CSI index futures, delivering 14.6% annualized return with real capital."
                - slot_id: "bq_2"
                  default: "Built systematic feature validation pipeline evaluating 4 factor families across 3,000+ securities using cross-sectional regression; validated features integrated into the fund's live portfolio construction."
            - entry_id: "ele"
              company: "Ele.me (Alibaba Group)"
              title: "Data Analyst"
              date: "SEPTEMBER 2013 - JULY 2015"
              technical_skills: "Python, SQL, Clustering, Anomaly Detection"
              bullets:
                - slot_id: "ele_1"
                  default: "Built anomaly detection system identifying 51,000+ suspicious order clusters across 2.2M+ users using pattern-matching algorithms (same-phone, high-frequency, repeat-order); deployed during Ele.me's hyper-growth phase pre-Alibaba acquisition."
        - section_id: "projects"
          entries:
            - entry_id: "uq_benchmark"
              company: "Project"
              title: "Uncertainty Quantification Benchmark"
              date: "FEBRUARY 2025 - AUGUST 2025"
              technical_skills: "PyTorch, Deep RL, HPC, Statistical Testing"
              bullets:
                - slot_id: "uq_1"
                  default: "Built reproducible benchmark evaluating 5 uncertainty quantification methods for Deep RL across 150+ training runs on HPC (SLURM) with automated 6-stage calibration pipeline."
                - slot_id: "uq_2"
                  default: "Discovered a noise paradox: moderate observation noise unexpectedly improved ensemble uncertainty estimates, challenging standard assumptions in UQ method evaluation."
            - entry_id: "expedia"
              company: "Project"
              title: "Expedia Hotel Recommendation"
              date: "APRIL 2024 - MAY 2024"
              technical_skills: "LightGBM, Learning-to-Rank, Feature Eng."
              bullets:
                - slot_id: "expedia_1"
                  default: "Built hotel recommendation system using LightGBM LambdaRank on 4.96M Expedia search records; engineered 50+ temporal, behavioral, and price-normalization features; achieved NDCG@5 = 0.392 on held-out Kaggle evaluation."
            - entry_id: "imu_sensor"
              company: "Course Project"
              title: "IMU Sensor Classification (ML4QS)"
              date: "JUNE 2024"
              technical_skills: "LightGBM, LSTM, Feature Eng., Time-Series"
              bullets:
                - slot_id: "imu_1"
                  default: "Built end-to-end ML pipeline for IMU sensor classification (4 subjects, 6 activities): Kalman Filter for noise reduction on 12 sensor channels, 576 FFT-based features (time + frequency domain), and LightGBM + bidirectional LSTM achieving 94-99% sex classification accuracy."
        - section_id: "skills"
          categories:
            - cat_id: "ml_modeling"
              default: "PyTorch, Hugging Face, scikit-learn, LightGBM, XGBoost, Deep RL, Statistical Testing"
            - cat_id: "programming"
              default: "Python, SQL, NumPy, pandas, Bash"
            - cat_id: "data_infrastructure"
              default: "PySpark, Airflow, FastAPI, AWS (Redshift, S3, EC2), Delta Lake, Docker, Git"
            - cat_id: "domains"
              default: "Feature Engineering, NLP, Time-Series, Anomaly Detection, UQ"

