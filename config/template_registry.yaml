# Template registry — 2026-04-17 revert
#
# After the 2026-04-17 tier revert, this file no longer drives template rendering.
# Every resume is FULL_CUSTOMIZE (base_template.html + AI-generated experiences).
#
# What remains: lightweight role metadata used as a hint for the C2 prompt so the
# AI can pick consistent role framing (DE vs ML vs DS) for bio, job titles, and
# project ordering. See docs/plans/2026-04-17-diagnostic-findings.md Signal 3.
#
# Retired: slot_schema, entry_visibility, slot_overrides. The zone templates
# themselves are archived at templates/archive/zone_templates_2026-04-17/.

