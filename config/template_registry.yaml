      sections:
        - section_id: "experience"
          entries:
            - entry_id: "glp"
              company: "GLP Technology (Fintech)"
              title: "Data Scientist & Team Lead"
              date: "JULY 2017 - AUGUST 2019"
              bullets:
                - slot_id: "glp_1"
                  default: "First data hire at a consumer lending startup; built the production lending decision stack from data ingestion and feature preparation through risk decisioning and portfolio monitoring for live lending operations."
                - slot_id: "glp_2"
                  default: "Owned credit scoring for automated underwriting: designed 29 data-driven rejection rules, 36 borrower segments, and a 19-feature scorecard predicting first-payment default, directly powering approve/reject lending decisions for loan applications."
                - slot_id: "glp_3"
                  default: "Built the data foundation for risk modeling and monitoring: daily ETL of 30+ production tables into AWS Redshift, plus a credit bureau parser normalizing nested JSON into 5 structured tables feeding underwriting features and post-loan performance tracking."
            - entry_id: "bq"
              company: "BQ Investment (Hedge Fund)"
              title: "Quantitative Researcher"
              date: "JULY 2015 - JUNE 2017"
              bullets:
                - slot_id: "bq_1"
                  default: "Developed and deployed an intraday CSI index futures strategy from research and backtesting through live execution, delivering 14.6% annualized return with real capital."
                - slot_id: "bq_2"
                  default: "Built a factor evaluation pipeline across 4 signal families (value, momentum, flow, event) for 3,000+ securities; signals that passed validation were incorporated into the fund's live portfolio decisions."
                - slot_id: "bq_3"
                  default: "Engineered market data pipelines for trading and research: 3,000+ securities across 5+ years of tick-level futures data from multiple vendor feeds, supporting repeatable research, backtesting, and live strategy execution."
            - entry_id: "ele"
              company: "Ele.me (Alibaba Group)"
              title: "Data Analyst"
              date: "SEPTEMBER 2013 - JULY 2015"
              bullets:
                - slot_id: "ele_1"
                  default: "Built rule-based fraud detection that surfaced 51,000+ suspicious order clusters across 2.2M+ users using 3 pattern-based methods (device clustering, frequency analysis, repeat-order detection) that supported fraud-loss prevention during a hyper-growth phase."
                - slot_id: "ele_2"
                  default: "Optimized 90+ Hadoop/Hive queries through partition pruning and subquery pushdown, cutting scan volume 5x (500GB to 100GB) and improving access to data across 30+ warehouse tables used by fraud, operations, and marketing teams."
        - section_id: "projects"
          entries:
            - entry_id: "uq_benchmark"
              company: "Project"
              title: "Uncertainty Quantification Benchmark"
              date: "FEBRUARY 2025 - AUGUST 2025"
              bullets:
                - slot_id: "uq_1"
                  default: "Developed benchmarking framework evaluating 5 uncertainty quantification methods for Deep RL across 150+ training runs on HPC (SLURM); demonstrated QR-DQN superiority with 31% lower CRPS (p < 0.001) over ensemble and dropout baselines."
            - entry_id: "expedia"
              company: "Project"
              title: "Expedia Hotel Recommendation"
              date: "APRIL 2024 - MAY 2024"
              bullets:
                - slot_id: "expedia_1"
                  default: "Built hotel recommendation system using LightGBM LambdaRank on 4.96M Expedia search records; engineered temporal, behavioral, and aggregation features (price normalization, competitor rates, estimated position); achieved NDCG@5 = 0.392 on Kaggle evaluation."
        - section_id: "skills"
          categories:
            - cat_id: "programming"
              default: "Python, SQL"
            - cat_id: "machine_learning"
              default: "PyTorch, scikit-learn, LightGBM, XGBoost, Learning to Rank, Statistical Testing"
            - cat_id: "data_systems"
              default: "Redshift, Airflow, Hadoop, Hive, ETL/ELT, Data Quality"
            - cat_id: "infrastructure"
              default: "AWS, Docker, Git"

