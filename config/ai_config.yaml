# =============================================================================
# AI Configuration
# =============================================================================
# Controls AI-powered job analysis and resume generation
# Created: 2026-02-05
# =============================================================================

# =============================================================================
# Model Configuration
# =============================================================================
# API keys and base URLs are loaded from .env file.
# See .env.example for required variables.
# =============================================================================

# Active provider: "deepseek" (API, cheap batch) or "claude_code" (CLI, flat subscription)
active_provider: "deepseek"

models:
  deepseek:
    provider: "openai_compatible"
    api_base: "https://api.deepseek.com"
    # API key loaded from env: DEEPSEEK_API_KEY
    model: "deepseek-v4-pro"
    max_tokens: 8192
    temperature: 0.1
    timeout: 180
  claude_code:
    provider: "claude_code"
    model: "default"
    max_tokens: 8192

# =============================================================================
# Scoring Thresholds
# =============================================================================

thresholds:
  ai_score_generate_resume: 5.0  # >= 5.0: trigger C2 resume tailoring (5.0 is actual apply floor per historical data)
  ai_score_apply_now: 7.0        # >= 7.0: mark as priority

# =============================================================================
# Prompt Construction Settings
# =============================================================================

prompt_settings:
  # Max chars to include from master resume HTML (actual file ~16k chars)
  master_resume_max_chars: 20000
  # Max chars to include from job description (actual max ~8k chars)
  job_description_max_chars: 10000

# =============================================================================
# AI Recommendation Thresholds (used in AI prompt)
# =============================================================================

# AI Recommendation Thresholds (used in AI PROMPT — intentionally different from scoring.yaml)
# These tell Claude how to classify ITS OWN scores. Rule-based thresholds are in scoring.yaml.
ai_recommendation_thresholds:
  apply_now: 7
  apply: 6
  maybe: 4

# =============================================================================
# Resume Generation
# =============================================================================

resume:
  # Template settings
  template: "templates/base_template.html"
  output_dir: "output"

  # PDF settings
  pdf:
    format: "A4"
    margin:
      top: "0.583in"
      right: "0.583in"
      bottom: "0.5in"
      left: "0.583in"
    print_background: true

# =============================================================================
# Prompt Templates (loaded from files)
# =============================================================================
# Edit prompts directly in assets/prompts/*.md — no need to touch this file.

prompts:
  evaluator: "assets/prompts/evaluator.md"
  tailor: "assets/prompts/tailor.md"

# =============================================================================
# Interview Scheduler
# =============================================================================

interview_scheduler:
  working_hours:
    start: "09:00"
    end: "17:00"
  peak_hours:
    start: "10:00"
    end: "12:00"
  buffer_minutes: 60
  timezone: "Europe/Amsterdam"

  # Personal energy profile (candidate-specific calibration)
  # Adjusts candidate cognitive dimension scores
  candidate_energy:
    morning_peak: 2.0       # 10:00-11:30 bonus (on top of base)
    morning_warmup: 1.0     # 09:00-10:00
    afternoon_focus: 0.0    # 14:00-15:30 (slight preference for morning, not a hard penalty)
    post_lunch_dip: -0.5    # 13:00-14:00
    late_afternoon: -0.5    # 15:30-17:00

metadata:
  version: "3.1.0"
  created: "2026-02-05"
  updated: "2026-03-31"
  author: "Fei Huang"
  description: "AI-powered job analysis and resume generation configuration (v3: C1/C2 split, Claude Code CLI only)"
