# =============================================================================
# AI Configuration
# =============================================================================
# Controls AI-powered job analysis and resume generation
# Created: 2026-02-05
# =============================================================================

# =============================================================================
# Model Configuration
# =============================================================================
# API keys and base URLs are loaded from .env file.
# See .env.example for required variables.
# =============================================================================

# Only Claude Code CLI path (flat subscription, no API key needed)
models:
  claude_code:
    provider: "claude_code"
    model: "default"  # uses whatever model Claude Code is configured with
    max_tokens: 8192

# =============================================================================
# Scoring Thresholds
# =============================================================================

thresholds:
  ai_score_generate_resume: 5.0  # >= 5.0: trigger C2 resume tailoring (5.0 is actual apply floor per historical data)
  ai_score_apply_now: 7.0        # >= 7.0: mark as priority

# =============================================================================
# Prompt Construction Settings
# =============================================================================

prompt_settings:
  # Max chars to include from master resume HTML (actual file ~16k chars)
  master_resume_max_chars: 20000
  # Max chars to include from job description (actual max ~8k chars)
  job_description_max_chars: 10000

  # Work experience sections to include in AI prompt (keys in bullet_library.yaml)
  experience_keys:
    - glp_technology
    - baiquan_investment
    - eleme
    - henan_energy

  # Project sections to include in AI prompt (keys in bullet_library.yaml)
  project_keys:
    - financial_data_lakehouse
    - thesis_uq_rl
    - nlp_projects
    - expedia_recommendation
    - ml4qs
    - graphsage_gnn
    - lifeos
    - job_hunter_automation
    - greenhouse_sensor_pipeline
    - evolutionary_robotics_research
    - sequence_analysis
    - deep_learning_fundamentals

# =============================================================================
# AI Recommendation Thresholds (used in AI prompt)
# =============================================================================

# AI Recommendation Thresholds (used in AI PROMPT — intentionally different from scoring.yaml)
# These tell Claude how to classify ITS OWN scores. Rule-based thresholds are in scoring.yaml.
ai_recommendation_thresholds:
  apply_now: 7
  apply: 6
  maybe: 4

# =============================================================================
# Resume Generation
# =============================================================================

resume:
  # Template settings
  template: "templates/base_template.html"
  output_dir: "output"

  # PDF settings
  pdf:
    format: "A4"
    margin:
      top: "0.583in"
      right: "0.583in"
      bottom: "0.5in"
      left: "0.583in"
    print_background: true

  # Career gap explanation (rendered below experience section)
  career_note: "Career transition (2019–2023): Relocated to the Netherlands and completed M.Sc. in Artificial Intelligence at VU Amsterdam (GPA 8.2/10)."

  # Interests line (rendered at bottom of resume)
  interests: "Philosophy, strategy games, distance running, analytical writing"

  # Candidate contact info (used by resume renderer)
  candidate:
    name: "Fei Huang"
    email: "huangf06@gmail.com"
    phone: "+31 645 038 614"
    location: "Amsterdam, Netherlands"
    linkedin: "https://www.linkedin.com/in/huangf06/"
    github: "https://github.com/huangf06"
    linkedin_display: "linkedin.com/in/huangf06"
    github_display: "github.com/huangf06"
    blog_url: "https://feithink.substack.com/"
    blog_display: "feithink.substack.com"

  # Education details (rendered in template)
  education:
    master:
      school: "Vrije Universiteit Amsterdam"
      location: "Amsterdam, Netherlands"
      degree: "M.Sc. in Artificial Intelligence"
      date: "Sep. 2023 -- Aug. 2025"
      gpa: "8.2/10"
      coursework: "Deep Learning (9.5), Multi-Agent Systems (9.5), ML4QS (9.5), NLP (9.0)"
      thesis: "Uncertainty Quantification in Deep Reinforcement Learning under Noisy Environments"
    bachelor:
      school: "Tsinghua University"
      location: "Beijing, China"
      degree: "B.Eng. in Industrial Engineering"
      date: "Sep. 2006 -- Jul. 2010"
      school_note: "Ranked #1 in China, top 20 globally"
      thesis: "Design and Implementation of Web-based Collaborative Office System (Java/MVC/SQL Server)"
    certification: "Databricks Certified Data Engineer Professional (2026)"

# =============================================================================
# AI Analysis Prompt Template
# =============================================================================

prompts:
  # C1: Evaluation prompt — scoring + application brief (short, no bullet library)
  evaluator: |
    # Job Match Evaluation

    ## Candidate Profile
    Name: Fei Huang
    Education: M.Sc. in Artificial Intelligence, VU Amsterdam (GPA 8.2/10, Aug 2025)
    Bachelor: B.Eng. Industrial Engineering, Tsinghua University (#1 in China)
    Certification: Databricks Certified Data Engineer Professional (2026)

    Key Skills: Python (Expert), PyTorch, PySpark, SQL, Delta Lake, AWS, Docker, Airflow
    Experience: ~6 years across data science, quantitative research, data engineering
    Recent: Financial Data Lakehouse project (Databricks, Spark, AWS, Delta Lake)
    Thesis: Uncertainty Quantification in Deep Reinforcement Learning

    ## Hard Reject Signals (score 1-2, recommendation: SKIP)
    If ANY of the following is true, score overall 1-2 and recommend SKIP:
    - Title indicates non-target role: recruiter, HR, policy, accountant,
      finance manager, pure marketing/sales/legal (without data/ML qualifier)
    - Primary tech stack is clearly wrong: embedded systems, kernel, PLC,
      SIEM, network engineering, release engineering, pure frontend
    - JD requires visa/residency candidate cannot provide:
      "no visa sponsorship", "must be located in [non-NL country]"
    - JD requires 5+ years of specific tech candidate lacks
      (Java, C++, Scala, Ruby, .NET, Azure)
    - Role is too senior: Director, VP, CTO, Head of, Principal
      (exception: "Senior Data/ML/AI Engineer/Scientist" is fine)
    - JD requires native Dutch speaker
    - Compensation far below market (< EUR 3000/month)

    ## Scoring Guidelines
    {scoring_guidelines}

    ## Target Job
    Title: {job_title}
    Company: {job_company}

    Job Description:
    {job_description}

    ## Resume Routing Decision
    We have professionally designed template resumes, human-reviewed through multiple
    iterations for narrative coherence, visual design, and cross-section resonance.
    AI-generated alternatives cannot replicate these qualities.

    Principle: when in doubt, use the template. Minor content gaps do not justify
    replacing a polished template with an AI-generated alternative.

    Available templates:
    {available_templates}

    Pre-selected template: {preselected_template_id} (confidence: {preselected_confidence})
    {ambiguous_warning}

    Routing rules:
    - USE_TEMPLATE: Default. Choose unless hiring manager would question fit at first glance.
      Acceptable gaps: missing a mentioned technology, different domain emphasis, slightly different experience years.
    - ADAPT_TEMPLATE: Only when structural positioning mismatch exists: bio positioning is wrong,
      or more than half the bullets are irrelevant, or skill ordering misrepresents fit.
    - FULL_CUSTOMIZE: Only when no template is remotely close.

    ## Output (JSON only, no markdown)
    {{
      "scoring": {{
        "overall_score": 7,
        "skill_match": 8,
        "experience_fit": 7,
        "growth_potential": 7,
        "recommendation": "APPLY",
        "reasoning": "2-3 sentences explaining the score"
      }},
      "application_brief": {{
        "hook": "One sentence: strongest connection between candidate and role",
        "key_angle": "One sentence: main selling point for this application",
        "gap_mitigation": "One sentence: biggest gap and how to address it, or null",
        "company_connection": "Personal connection to company mission, or null if none"
      }},
      "resume_routing": {{
        "tier": "USE_TEMPLATE",
        "template_id": "{preselected_template_id}",
        "override": false,
        "override_reason": null,
        "gaps": ["specific gap 1"],
        "adapt_instructions": null
      }}
    }}

    recommendation values: "APPLY_NOW" (>={apply_now_threshold}), "APPLY" (>={apply_threshold}), "MAYBE" (>={maybe_threshold}), "SKIP" (<{maybe_threshold})

  # C2: Resume tailoring prompt (long, includes bullet library)
  tailor: |
    # Job Match Analysis & Resume Tailoring

    You are an expert career advisor helping a job seeker tailor their resume.

    ## Candidate Profile
    Name: Fei Huang
    Education: M.Sc. in Artificial Intelligence, VU Amsterdam (Graduated Aug 2025, GPA 8.2/10)
    Bachelor: B.Eng. Industrial Engineering, Tsinghua University (Ranked #1 in China)

    Key Background:
    - Recent M.Sc. AI graduate with thesis on Uncertainty Quantification in Deep RL
    - Data Scientist & Team Lead at fintech (GLP Technology: credit scoring, PySpark pipelines)
    - Quantitative Researcher at hedge fund (alpha research, live strategy deployment)
    - Built Financial Data Lakehouse portfolio project (Databricks, Spark, AWS, Delta Lake)
    - Databricks Certified Data Engineer Professional (2026)
    - Skills: Python, PyTorch, Spark/PySpark, SQL, Delta Lake, AWS, Docker, Airflow

    ## Bullet Library (Verified Experience)
    {bullet_library}

    ## Target Job
    Title: {job_title}
    Company: {job_company}

    Job Description:
    {job_description}

    ## C1 Analysis Context
    This job was evaluated and scored {c1_score}/10 ({c1_recommendation}).
    C1 Reasoning: {c1_reasoning}
    Application Brief: {c1_brief}

    ## Your Task
    **Tailor the resume** by selecting the most relevant content:
    - Bio: write 2-3 sentences if it adds value, or set to null
    - MUST select 2-3 different work experiences from different companies
    - Select 1-3 projects based on JD relevance
    - Select bullets BY THEIR ID (shown in [square brackets] in the library above)
    - Provide 4-6 skill categories from the allowed list
    - Focus on RELEVANCE — include all bullets that match the JD, no artificial limits
    - Use the application brief's key_angle and hook to guide your narrative choices

    ## Output Format (JSON)

    Respond with ONLY valid JSON (no markdown, no explanation):

    {{
      "tailored_resume": {{
        "bio": {{
          "role_title": "Data Engineer",
          "years": 6,
          "domain_claims": ["data_pipelines", "credit_risk"],
          "include_education": true,
          "include_certification": true,
          "closer_id": "eager_company"
        }},
        "experiences": [
          {{
            "company": "GLP Technology",
            "company_note": null,
            "location": "Shanghai, China",
            "title": "Data Scientist & Team Lead",
            "date": "Jul. 2017 -- Aug. 2019",
            "bullets": ["glp_founding_member", "glp_decision_engine", "glp_data_engineer"]
          }},
          {{
            "company": "Baiquan Investment",
            "company_note": null,
            "location": "Beijing, China",
            "title": "Quantitative Researcher",
            "date": "Jul. 2015 -- Jun. 2017",
            "bullets": ["bq_factor_research", "bq_de_factor_engine"]
          }},
          {{
            "company": "Ele.me",
            "company_note": "(acquired by Alibaba)",
            "location": "Shanghai, China",
            "title": "Data Analyst",
            "date": "Sep. 2013 -- Jul. 2015",
            "bullets": ["eleme_ab_testing"]
          }}
        ],
        "projects": [
          {{
            "name": "Financial Data Lakehouse (Databricks/Spark/AWS)",
            "date": "Oct. 2025 -- Present",
            "bullets": ["lakehouse_streaming", "lakehouse_quality"]
          }},
          {{
            "name": "Expedia Hotel Recommendation System",
            "date": "2024",
            "bullets": ["expedia_ltr"]
          }}
        ],
        "skills": [
          {{"category": "Languages & Core", "skills_list": "Python (Expert), SQL (Expert), Bash"}},
          {{"category": "Data Engineering", "skills_list": "PySpark, Delta Lake, Databricks, ETL/ELT, Schema Evolution"}},
          {{"category": "Cloud & DevOps", "skills_list": "AWS (EMR, Glue, S3, Lambda), Docker, CI/CD, Airflow"}},
          {{"category": "Databases", "skills_list": "PostgreSQL, MySQL, Hadoop, Hive"}},
          {{"category": "ML/AI Frameworks", "skills_list": "XGBoost, LightGBM, PyTorch, Statistics, A/B Testing"}}
        ]
      }}
    }}

    ## Important Rules

    ### CONTENT SELECTION PRINCIPLE
    Select content that builds the strongest possible narrative for THIS specific job.
    Quality over quantity — 3 well-chosen bullets that tell a coherent story beat 5 relevant-but-disconnected bullets.
    The resume can be 1-2 pages. Sections order: Education → Projects → Experience → Skills → Interests.
    Education and Interests are static. You control: bio (optional), experiences, projects, skills.

    ### BIO RULES (STRUCTURED FORMAT)
    - Bio is a STRUCTURED OBJECT, not free text. The system assembles the final text.
    - Set bio to null ONLY if no strong angle exists for this role.
    - Select role_title from: {bio_allowed_titles_list}
    - years: integer 4-6 (max 6)
    - domain_claims: pick 1-2 IDs from this list ONLY:
      {bio_domain_claims_list}
    - include_education: true/false (include M.Sc. mention)
    - include_certification: true/false (include Databricks cert)
    - closer_id: "eager_company", "seeking_impact", "generic", or null
      IMPORTANT: If the company is a staffing/recruitment agency (e.g., Hays, Randstad, TMC, Keystone, Jobgether, Amaris, Robert Half, etc.), use "generic" — do NOT name the agency since the resume will be forwarded to the actual hiring company.
    - DOMAIN HONESTY: Only select domain_claims relevant to the JD AND supported by actual experience.
    {bio_constraints}

    ### TITLE SELECTION
    {title_context}

    ### COMPANY_NOTE
    - Ele.me: ALWAYS set company_note to "(acquired by Alibaba)"
    - Other companies: set to null

    ### PAGE BALANCE (CRITICAL)
    The resume uses a two-column layout: Experience on the left, Education/Projects/Skills on the right.
    Both columns MUST be roughly balanced in height. The right column tends to overflow because it
    contains multiple sections (Education, Certification, Projects, Skills, Languages).
    Be CONSERVATIVE with right-column content (projects, skill categories).

    ### BULLET DISTRIBUTION (GUIDANCE, NOT HARD LIMITS)
    Include bullets based on JD relevance. Typical ranges:
    - Most relevant experience: 2-4 bullets
    - Second experience: 2-3 bullets
    - Third experience (if included): 1-2 bullets
    - Main project: 2-3 bullets
    - Second project: 1-2 bullets
    - Total project bullets across ALL projects: max 5

    ### NARRATIVE COMPOSITION (CRITICAL FOR RESUME QUALITY)

    A hiring manager reads each experience section for 10-15 seconds. They ask:
    1. "Who was this person at this company?" → answered by the FIRST bullet
    2. "What's the most impressive thing they did?" → answered by the SECOND bullet
    3. "What else supports this?" → answered by remaining bullets

    Your bullet selection and ordering must answer these questions IN THIS ORDER.

    #### Narrative Roles
    Each bullet has a narrative_role tag shown in parentheses. Use these to compose sections:

    | Role | What it does | Where to place |
    |------|-------------|----------------|
    | context_setter | Establishes scope, seniority, why this matters | FIRST in section |
    | depth_prover | Technical crown jewel, interview hook | SECOND (or first if no context_setter) |
    | foundation | Engineering infrastructure powering the above | After depth_prover |
    | extension | System evolution, broader reach | Late in section |
    | breadth | Cross-functional, leadership | Last, only if space allows |

    Composition rules:
    1. Each section with 2+ bullets MUST lead with a context_setter or depth_prover — NEVER start with foundation or breadth
    2. NEVER select 2 bullets with the same narrative_role in one section
    3. If a RECOMMENDED SEQUENCE exists for this role type, you MUST use exactly those bullets in that order. Do not cherry-pick, reorder, or substitute. You may OMIT the last bullet(s) if space is tight, but the remaining bullets must stay in sequence order. If no sequence matches the target role, fall back to narrative_role ordering
    4. Vary sentence openings across bullets within a section — if one starts with "Built", the next MUST use a different verb pattern (not "Built/Developed/Engineered/Designed")

    #### Cross-Section Strategy
    Each experience section should contribute something UNIQUE to the overall resume:
    - The most JD-relevant experience gets 3-4 bullets and carries the narrative weight
    - Less relevant experiences get 1-2 bullets showing a different strength
    - Do NOT demonstrate the same skill/achievement across multiple sections
    - Together, all sections should cover: technical depth + engineering capability + business awareness

    ### SKILLS FORMAT
    - Provide 4-5 categories from this ALLOWED list ONLY:
      {allowed_skill_categories_list}
    - Do NOT invent category names outside this list
    - Include proficiency levels for Languages (e.g., "Python (Expert)")
    - Include specific cloud services (e.g., "AWS (EMR, Glue, S3, Lambda)")
    - Prioritize skills mentioned in the JD
    - Each category should have 3-6 items

    ### SKILLS HONESTY RULE (ABSOLUTE)
    {skill_context}

    Do NOT:
    - Use "Learning", "Willing to Learn", or "Familiar" qualifiers — these look weak
    - Invent skill categories like "Change Management" or "Infrastructure as Code"
    If the JD requires a skill the candidate lacks, simply omit it — do not fake it.

    ### PROJECT SELECTION
    - Select 1-2 projects based on JD relevance (max 2 to maintain page balance)
    - For Data Engineer roles: prioritize Financial Data Lakehouse
    - For ML/DS roles: prioritize Thesis or Expedia
    - For NLP/AI roles: prioritize NLP Projects or Thesis
    - THESIS RULE: When including thesis_uq_rl, ALWAYS include thesis_noise_paradox (the original discovery) — do NOT only include thesis_uq_framework (measurement-only looks weak)

    ### BULLET SELECTION RULE (ABSOLUTE)
    Select bullets BY THEIR ID — the string shown in [square brackets] in the library above.
    In the JSON output, put ONLY the bullet ID string, NOT the full text.
    The system will automatically look up the verified text from the library.

    Example: "bullets": ["glp_founding_member", "glp_decision_engine"]

    Do NOT:
    - Copy the bullet text into the JSON — use the ID only
    - Invent new bullet IDs that don't exist in the library
    - Modify bullet IDs (use them exactly as shown in square brackets)
    Any unrecognized bullet ID will cause the resume to be REJECTED.

    ### OTHER RULES
    1. Use ONLY bullet IDs from the provided bullet library - do not fabricate
    2. MUST include 2-3 different work experiences from different companies
    3. Select bullets that best match the JD requirements AND form a coherent narrative per section
    4. Prefer narrative composition over exhaustive coverage — omit a relevant bullet if it breaks the narrative flow

  tailor_adapt: |
    # Template Adaptation

    You are adapting a polished resume template for a specific job. Do not rewrite the full resume.

    ## Target Job
    Title: {job_title}
    Company: {job_company}

    Job Description:
    {job_description}

    ## Routing Context
    Gaps: {routing_gaps}
    Adapt instructions: {adapt_instructions}

    ## Template Schema
    {template_schema}

    ## CONSTRAINTS (HARD LIMITS — violating any will reject the resume)
    - bio_1, bio_2, bio_3: each line MUST be <= 105 characters. Count carefully.
    - skills_override values: each MUST be <= 80 characters.
    - Max 5 skill categories total.

    ## Output JSON
    {{
      "slot_overrides": {{
        "bio_1": "First line of bio (max 105 chars)",
        "bio_2": "Second line of bio (max 105 chars)",
        "bio_3": "Third line of bio (max 105 chars)"
      }},
      "skills_override": {{
        "programming": "Optional replacement skill line (max 80 chars)"
      }},
      "entry_visibility": {{
        "glp": true
      }},
      "change_summary": "One sentence summary of the changes"
    }}

    ## Bio Writing Rules
    - The bio is exactly 3 lines. Each line is rendered independently (no word wrapping).
    - Line 1: Role + years + domain scope (most important — the hook).
    - Line 2: Key accomplishment or strength summary.
    - Line 3: Education credentials + certifications.
    - Each line must be a complete, readable phrase (no mid-word breaks).
    - If you don't need to change the bio, omit bio_1/bio_2/bio_3 from slot_overrides entirely.

  c3_gate: |
    You are reviewing whether adapting a polished resume template improves job fit enough
    to justify using the adapted version over the original.

    The original template has been professionally designed through 9+ iterations for
    narrative coherence, visual design, and cross-section resonance.

    {structured_diff}

    ## Decision criteria
    - Does each change demonstrably improve fit for THIS specific job?
    - Are the new bullet texts of comparable quality to the originals?
    - Is the change density proportionate? (>60% modified = essentially a rewrite -> FAIL)
    - Would a hiring manager notice the gaps if we used the unmodified template?

    Output JSON:
    {{
      "decision": "PASS",
      "confidence": 0.8,
      "reason": "one sentence"
    }}

